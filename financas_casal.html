<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças do Casal 💑</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #a29bfe;
    --primary-dark: #4a3cbf;
    --secondary: #00b894;
    --secondary-light: #55efc4;
    --accent: #fd79a8;
    --geo: #0984e3;
    --geo-light: #74b9ff;
    --vi: #e84393;
    --vi-light: #fab1d3;
    --bg: #f7f6fc;
    --surface: #ffffff;
    --surface2: #f0effe;
    --border: rgba(108,92,231,0.12);
    --text: #2d2a3e;
    --text2: #6b6580;
    --text3: #9e98b8;
    --danger: #d63031;
    --danger-light: #ffeaa7;
    --success: #00b894;
    --warning: #fdcb6e;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 20px rgba(108,92,231,0.08);
    --shadow-sm: 0 2px 8px rgba(108,92,231,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* HEADER */
  .app-header {
    background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 100%);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(108,92,231,0.25);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 0;
  }
  .app-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .app-title span { opacity: 0.75; font-weight: 400; font-size: 14px; display: block; }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.3); }

  /* USER TABS */
  .user-tabs {
    display: flex;
    margin: 12px 20px 0;
    gap: 0;
    background: rgba(0,0,0,0.12);
    border-radius: 12px 12px 0 0;
    overflow: hidden;
  }
  .user-tab {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .user-tab.active {
    background: rgba(255,255,255,0.2);
    color: white;
  }
  .user-tab .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .user-tab.vitoria .dot { background: var(--vi-light); }
  .user-tab.geo .dot { background: var(--geo-light); }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px 20px 14px;
  }
  .month-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
  }
  .month-btn:hover { background: rgba(255,255,255,0.35); }
  .month-label {
    font-size: 15px;
    font-weight: 600;
    color: white;
    min-width: 130px;
    text-align: center;
  }

  /* MAIN CONTENT */
  .main {
    padding: 16px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .summary-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }
  .summary-card.full { grid-column: 1/-1; }
  .summary-card .label {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .summary-card .value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .summary-card .value.positive { color: var(--success); }
  .summary-card .value.negative { color: var(--danger); }
  .summary-card .value.neutral { color: var(--text); }
  .summary-card .sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .income-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }
  .income-row .amt { font-weight: 600; color: var(--text); }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 12px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon { font-size: 18px; }

  /* ADD EXPENSE BTN */
  .btn-add {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(108,92,231,0.3);
  }
  .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-add .plus { font-size: 20px; line-height: 1; }

  /* EXPENSE LIST */
  .expense-list { display: flex; flex-direction: column; gap: 8px; }
  .expense-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .expense-item:hover { border-color: var(--primary-light); box-shadow: 0 4px 16px rgba(108,92,231,0.12); }
  .expense-item.paid { opacity: 0.6; }
  .cat-dot {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .expense-info { flex: 1; min-width: 0; }
  .expense-desc {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .expense-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .expense-meta .parcel {
    background: var(--surface2);
    border-radius: 6px;
    padding: 1px 6px;
    color: var(--primary);
    font-weight: 600;
    font-size: 11px;
  }
  .expense-right { text-align: right; flex-shrink: 0; }
  .expense-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .expense-payment {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }
  .paid-badge {
    background: #e8f8f2;
    color: var(--success);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .unpaid-badge {
    background: #fff3e0;
    color: #f39c12;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  /* VENCIMENTO SEPARATOR */
  .venc-separator {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0 10px;
  }
  .venc-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .venc-line { flex: 1; height: 1px; background: var(--border); }
  .venc-total {
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    white-space: nowrap;
  }

  /* CATEGORY BREAKDOWN */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }
  .cat-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .cat-card .cat-icon { font-size: 22px; margin-bottom: 6px; }
  .cat-card .cat-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .cat-card .cat-amount { font-size: 15px; font-weight: 700; color: var(--text); }
  .cat-card .cat-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
  .cat-card .cat-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 500px;
    padding: 20px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .cat-picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .cat-btn {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 4px;
    background: var(--bg);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-size: 13px;
    color: var(--text2);
  }
  .cat-btn .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-btn:hover { border-color: var(--primary-light); background: var(--surface2); }
  .cat-btn.selected { border-color: var(--primary); background: var(--surface2); color: var(--primary); font-weight: 600; }
  .btn-save {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .btn-save:hover { background: var(--primary-dark); }
  .btn-delete {
    width: 100%;
    background: transparent;
    color: var(--danger);
    border: 1.5px solid #fad;
    border-radius: var(--radius-sm);
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-delete:hover { background: #fff5f5; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* BOTTOM FAB */
  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #6C5CE7, #a29bfe);
    color: white;
    border: none;
    border-radius: 20px;
    width: 58px; height: 58px;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(108,92,231,0.4);
    transition: all 0.2s;
    z-index: 150;
  }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(0.95); }

  /* SALARY INPUTS */
  .salary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .salary-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    cursor: pointer;
    transition: all 0.2s;
  }
  .salary-card:hover { border-color: var(--primary-light); }
  .salary-card .slabel { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .salary-card .sval { font-size: 18px; font-weight: 700; color: var(--text); }
  .salary-card .sedit { font-size: 11px; color: var(--primary); margin-top: 2px; }
  .salary-card .sinput {
    display: none;
    width: 100%;
    border: none;
    outline: none;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
    background: transparent;
    font-family: inherit;
  }
  .salary-card.editing .sinput { display: block; }
  .salary-card.editing .sval, .salary-card.editing .sedit { display: none; }

  /* PROGRESS BAR FOR TOTAL */
  .total-bar {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .bar-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
  .bar-label .bl { color: var(--text2); }
  .bar-label .br { font-weight: 700; color: var(--text); }
  .bar-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .bar-fill.ok { background: linear-gradient(90deg, var(--success), var(--secondary-light)); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--warning), #f39c12); }
  .bar-fill.over { background: linear-gradient(90deg, var(--danger), #ff7675); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* TOGGLE SWITCH */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
  }
  .toggle-label { font-size: 14px; color: var(--text2); }
  .toggle {
    position: relative;
    width: 44px; height: 24px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* RESPONSIVE */
  @media (min-width: 600px) {
    .main { padding: 24px; }
    .cat-picker { grid-template-columns: repeat(5, 1fr); }
    .modal { border-radius: 24px; margin: 20px; width: calc(100% - 40px); }
    .modal-overlay { align-items: center; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .summary-grid { grid-template-columns: repeat(4, 1fr); }
    .cat-grid { grid-template-columns: repeat(5, 1fr); }
  }

  /* DETAIL VIEW */
  .detail-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .btn-toggle-paid {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--success);
    background: transparent;
    color: var(--success);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-toggle-paid.paid-state { background: #e8f8f2; }
  .btn-toggle-paid:hover { background: #e8f8f2; }

  /* FILTER CHIPS */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .chip.active { background: var(--primary); border-color: var(--primary); color: white; }
  .chip:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); }

  .saldo-positivo { color: var(--success) !important; }
  .saldo-negativo { color: var(--danger) !important; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">
      💑 Finanças do Casal
      <span id="current-year"></span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="showSalaryModal()" title="Editar salários">💰</button>
    </div>
  </div>
  <div class="user-tabs">
    <button class="user-tab vitoria active" onclick="switchUser('vitoria')">
      <span class="dot"></span> Vitória
    </button>
    <button class="user-tab geo" onclick="switchUser('geo')">
      <span class="dot"></span> Geovanne
    </button>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="prevMonth()">‹</button>
    <span class="month-label" id="month-label">Junho 2025</span>
    <button class="month-btn" onclick="nextMonth()">›</button>
  </div>
</header>

<main class="main" id="main-content">
  <!-- Filled by JS -->
</main>

<button class="fab" onclick="openAddModal()" title="Novo lançamento">+</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">➕ Novo lançamento</div>
    <form id="expense-form" onsubmit="saveExpense(event)">
      <input type="hidden" id="edit-id">

      <div class="form-group">
        <label class="form-label">Usuário</label>
        <div style="display:flex;gap:10px">
          <button type="button" class="cat-btn selected" id="user-btn-vitoria" onclick="selectFormUser('vitoria')" style="flex:1;flex-direction:column;display:flex;align-items:center">
            <span class="emoji">👩</span>Vitória
          </button>
          <button type="button" class="cat-btn" id="user-btn-geo" onclick="selectFormUser('geo')" style="flex:1;flex-direction:column;display:flex;align-items:center">
            <span class="emoji">👨</span>Geovanne
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="cat-picker" id="cat-picker"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input type="text" class="form-input" id="f-desc" placeholder="Ex: Mercado, Uber, Netflix..." required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input type="number" class="form-input" id="f-value" placeholder="0,00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Vencimento</label>
          <select class="form-select" id="f-venc">
            <option value="20">Dia 20</option>
            <option value="05">Dia 05</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pagamento</label>
          <input type="text" class="form-input" id="f-payment" placeholder="PIX, Nubank...">
        </div>
        <div class="form-group">
          <label class="form-label">Parcela</label>
          <input type="text" class="form-input" id="f-parcel" placeholder="Ex: 2/6">
        </div>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">Já pago?</span>
        <label class="toggle">
          <input type="checkbox" id="f-paid">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <button type="submit" class="btn-save">💾 Salvar</button>
      <button type="button" class="btn-delete" id="btn-delete" onclick="deleteExpense()" style="display:none">🗑 Excluir lançamento</button>
    </form>
  </div>
</div>

<!-- Salary Modal -->
<div class="modal-overlay" id="salary-modal-overlay" onclick="closeSalaryModal(event)">
  <div class="modal" id="salary-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Salários do mês</div>
    <div id="salary-form-content"></div>
    <button class="btn-save" onclick="saveSalaries()">Salvar salários</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTH_KEYS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

const CATEGORIES = [
  { id: 'casa', emoji: '🏠', label: 'Casa', color: '#0984e3' },
  { id: 'saude', emoji: '💊', label: 'Saúde', color: '#e17055' },
  { id: 'necessidade', emoji: '🛒', label: 'Necessidade', color: '#00b894' },
  { id: 'bem-estar', emoji: '✨', label: 'Bem-estar', color: '#a29bfe' },
  { id: 'presente', emoji: '🎁', label: 'Presente', color: '#fd79a8' },
  { id: 'investimento', emoji: '📈', label: 'Invest.', color: '#00cec9' },
  { id: 'igreja', emoji: '⛪', label: 'Igreja', color: '#6c5ce7' },
  { id: 'dividas', emoji: '💳', label: 'Dívidas', color: '#d63031' },
  { id: 'educacao', emoji: '📚', label: 'Educação', color: '#fdcb6e' },
  { id: 'diversao', emoji: '🎉', label: 'Diversão', color: '#e84393' },
  { id: 'outros', emoji: '📦', label: 'Outros', color: '#b2bec3' },
];

function catById(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length-1];
}

let state = {
  user: 'vitoria',
  year: 2025,
  month: 5, // 0-indexed
  filterCat: 'all',
  data: {}
};

function storageKey(year, month) {
  return `finances_${year}_${MONTH_KEYS[month]}`;
}

function getMonthData() {
  const key = storageKey(state.year, state.month);
  if (!state.data[key]) {
    state.data[key] = { vitoria: { salary20: 860, salary05: 1000, extra: 0, expenses: [] }, geo: { salary20: 1200, salary05: 1429.83, extra: 0, expenses: [] } };
    loadPreset(key);
  }
  return state.data[key];
}

function loadPreset(key) {
  // Seed with some real data from spreadsheet for Jun 2025
  if (key !== 'finances_2025_jun') return;
  const d = state.data[key];
  d.vitoria.salary20 = 860; d.vitoria.salary05 = 1000; d.vitoria.extra = 0;
  d.vitoria.expenses = [
    {id:uid(),cat:'igreja',desc:'Dízimo',value:175,venc:'20',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'casa',desc:'Terreno - Geo',value:238.55,venc:'20',payment:'PIX',parcel:'03/12',paid:false},
    {id:uid(),cat:'casa',desc:'Água',value:35,venc:'20',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'casa',desc:'Luz',value:15,venc:'20',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'casa',desc:'Anéis - Geo',value:75,venc:'20',payment:'Nubank',parcel:'2/10',paid:false},
    {id:uid(),cat:'casa',desc:'Piso Grosso',value:54.45,venc:'20',payment:'Nubank',parcel:'2/5',paid:false},
    {id:uid(),cat:'necessidade',desc:'Creme',value:37.5,venc:'20',payment:'PicPay Geo',parcel:'',paid:false},
    {id:uid(),cat:'necessidade',desc:'Absorvente',value:17.9,venc:'20',payment:'',parcel:'',paid:false},
    {id:uid(),cat:'casa',desc:'Canos',value:67.77,venc:'05',payment:'Bradesco',parcel:'8/11',paid:false},
    {id:uid(),cat:'casa',desc:'Hidráulica + Energia',value:237.76,venc:'05',payment:'Bradesco',parcel:'9/12',paid:false},
    {id:uid(),cat:'casa',desc:'Reboco',value:37.65,venc:'05',payment:'Inter',parcel:'4/4',paid:false},
    {id:uid(),cat:'casa',desc:'Piso Grosso',value:118.89,venc:'05',payment:'Inter',parcel:'3/12',paid:false},
    {id:uid(),cat:'casa',desc:'Piso - Materiais',value:95.31,venc:'05',payment:'BB',parcel:'4/6',paid:false},
    {id:uid(),cat:'casa',desc:'Piso',value:21.03,venc:'05',payment:'BB',parcel:'3/12',paid:false},
    {id:uid(),cat:'investimento',desc:'Investimento',value:300,venc:'05',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'educacao',desc:'Inglês',value:200,venc:'05',payment:'PicPay',parcel:'',paid:false},
    {id:uid(),cat:'necessidade',desc:'Creme',value:14.91,venc:'05',payment:'Inter',parcel:'1/4',paid:false},
    {id:uid(),cat:'necessidade',desc:'Recarga',value:20,venc:'05',payment:'',parcel:'',paid:false},
  ];
  d.geo.salary20 = 1272; d.geo.salary05 = 1521.05; d.geo.extra = 0;
  d.geo.expenses = [
    {id:uid(),cat:'dividas',desc:'Moto',value:817,venc:'20',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'dividas',desc:'Anéis',value:75,venc:'20',payment:'Nubank Vitória',parcel:'4/10',paid:false},
    {id:uid(),cat:'dividas',desc:'Água',value:120,venc:'20',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'dividas',desc:'Piso Grosso',value:54.45,venc:'20',payment:'Nubank Vitória',parcel:'4/5',paid:false},
    {id:uid(),cat:'dividas',desc:'Revisão moto',value:84.23,venc:'20',payment:'Nubank Geo',parcel:'4/4',paid:false},
    {id:uid(),cat:'dividas',desc:'5K instalações',value:237.77,venc:'05',payment:'Bradesco Vitória',parcel:'10/12',paid:false},
    {id:uid(),cat:'dividas',desc:'Cerâmica',value:309.02,venc:'05',payment:'Bradesco Vitória',parcel:'3/10',paid:false},
    {id:uid(),cat:'dividas',desc:'Computador',value:69.77,venc:'05',payment:'Bradesco Vitória',parcel:'12/12',paid:false},
    {id:uid(),cat:'dividas',desc:'Encanação',value:67.77,venc:'05',payment:'Bradesco Vitória',parcel:'10/10',paid:false},
    {id:uid(),cat:'dividas',desc:'Wap',value:31.99,venc:'05',payment:'Nubank Geo',parcel:'10/10',paid:false},
    {id:uid(),cat:'necessidade',desc:'Recarga',value:30,venc:'05',payment:'Nubank Geo',parcel:'',paid:false},
    {id:uid(),cat:'dividas',desc:'Terreno',value:238.55,venc:'05',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'necessidade',desc:'Cabelo',value:25,venc:'05',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'dividas',desc:'Água',value:35,venc:'05',payment:'PIX',parcel:'',paid:false},
    {id:uid(),cat:'casa',desc:'Piso - Pedreiro',value:118.89,venc:'05',payment:'Inter',parcel:'5/12',paid:false},
    {id:uid(),cat:'casa',desc:'Piso - Materiais',value:95.31,venc:'05',payment:'BB',parcel:'5/6',paid:false},
    {id:uid(),cat:'casa',desc:'Piso',value:21.03,venc:'05',payment:'BB Vitória',parcel:'5/12',paid:false},
  ];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function saveData() { localStorage.setItem('finances_state', JSON.stringify(state.data)); }
function loadData() {
  const saved = localStorage.getItem('finances_state');
  if (saved) state.data = JSON.parse(saved);
}

// =====================
// RENDER
// =====================
function render() {
  document.getElementById('current-year').textContent = state.year;
  document.getElementById('month-label').textContent = `${MONTHS[state.month]} ${state.year}`;
  document.querySelectorAll('.user-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.user-tab.${state.user}`).classList.add('active');

  const md = getMonthData();
  const ud = md[state.user];
  const allExp = ud.expenses;
  const filtered = state.filterCat === 'all' ? allExp : allExp.filter(e => e.cat === state.filterCat);
  const exp20 = filtered.filter(e => e.venc === '20');
  const exp05 = filtered.filter(e => e.venc === '05');
  const total20 = allExp.filter(e=>e.venc==='20').reduce((a,e)=>a+Number(e.value),0);
  const total05 = allExp.filter(e=>e.venc==='05').reduce((a,e)=>a+Number(e.value),0);
  const totalIncome = ud.salary20 + ud.salary05 + ud.extra;
  const totalSpent = total20 + total05;
  const balance = totalIncome - totalSpent;
  const pct = Math.min(100, totalIncome > 0 ? (totalSpent/totalIncome)*100 : 0);

  // Category breakdown
  const catTotals = {};
  allExp.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + Number(e.value); });
  const maxCat = Math.max(...Object.values(catTotals), 1);

  let html = '';

  // Salary cards
  html += `<div class="salary-grid">
    <div class="salary-card" id="sc20" onclick="editSalaryCard('20')">
      <div class="slabel">💼 Salário Dia 20</div>
      <div class="sval">${fmt(ud.salary20)}</div>
      <div class="sedit">Toque para editar</div>
      <input class="sinput" type="number" id="si20" value="${ud.salary20}" onblur="saveSalaryCard('20')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
    <div class="salary-card" id="sc05" onclick="editSalaryCard('05')">
      <div class="slabel">💼 Salário Dia 05</div>
      <div class="sval">${fmt(ud.salary05)}</div>
      <div class="sedit">Toque para editar</div>
      <input class="sinput" type="number" id="si05" value="${ud.salary05}" onblur="saveSalaryCard('05')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
  </div>`;

  // Summary
  html += `<div class="summary-grid">
    <div class="summary-card">
      <div class="label">Renda total</div>
      <div class="value neutral">${fmt(totalIncome)}</div>
      <div class="sub">Salários + extras</div>
    </div>
    <div class="summary-card">
      <div class="label">Total gasto</div>
      <div class="value ${pct >= 100 ? 'negative' : pct >= 80 ? '' : 'neutral'}">${fmt(totalSpent)}</div>
      <div class="sub">${pct.toFixed(0)}% da renda</div>
    </div>
    <div class="summary-card full">
      <div class="label">Saldo do mês</div>
      <div class="value ${balance >= 0 ? 'positive' : 'negative'}">${balance >= 0 ? '+' : ''}${fmt(balance)}</div>
      <div class="sub">${balance >= 0 ? '🟢 Dentro do limite' : '🔴 Acima da renda'}</div>
    </div>
  </div>`;

  // Progress bar
  const barClass = pct < 80 ? 'ok' : pct < 100 ? 'warn' : 'over';
  html += `<div class="total-bar">
    <div class="bar-label"><span class="bl">Uso da renda</span><span class="br">${fmt(totalSpent)} / ${fmt(totalIncome)}</span></div>
    <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${Math.min(pct,100)}%"></div></div>
    <div style="display:flex;gap:12px;margin-top:10px">
      <span style="font-size:12px;color:var(--text3)">📅 Dia 20: <b style="color:var(--text)">${fmt(total20)}</b></span>
      <span style="font-size:12px;color:var(--text3)">📅 Dia 05: <b style="color:var(--text)">${fmt(total05)}</b></span>
    </div>
  </div>`;

  // Category breakdown
  if (Object.keys(catTotals).length > 0) {
    html += `<div class="section-header"><div class="section-title"><span class="icon">📊</span> Por categoria</div></div>`;
    html += `<div class="cat-grid">`;
    CATEGORIES.forEach(cat => {
      if (!catTotals[cat.id]) return;
      const pctCat = (catTotals[cat.id]/maxCat)*100;
      html += `<div class="cat-card">
        <div class="cat-icon">${cat.emoji}</div>
        <div class="cat-name">${cat.label}</div>
        <div class="cat-amount">${fmt(catTotals[cat.id])}</div>
        <div class="cat-bar"><div class="cat-fill" style="width:${pctCat}%;background:${cat.color}"></div></div>
      </div>`;
    });
    html += `</div>`;
  }

  // Filter chips
  html += `<div class="section-header"><div class="section-title"><span class="icon">📋</span> Lançamentos</div>
    <button class="btn-add" onclick="openAddModal()"><span class="plus">+</span> Novo</button>
  </div>`;

  html += `<div class="filter-bar">
    <button class="chip ${state.filterCat==='all'?'active':''}" onclick="filterCat('all')">Todos (${allExp.length})</button>`;
  CATEGORIES.forEach(cat => {
    const cnt = allExp.filter(e=>e.cat===cat.id).length;
    if (cnt > 0) html += `<button class="chip ${state.filterCat===cat.id?'active':''}" onclick="filterCat('${cat.id}')">${cat.emoji} ${cat.label} (${cnt})</button>`;
  });
  html += `</div>`;

  // Expenses
  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">📭</div><p>Nenhum lançamento ainda.<br>Toque em + para adicionar.</p></div>`;
  } else {
    html += `<div class="expense-list">`;

    if (exp20.length > 0) {
      const t20f = exp20.reduce((a,e)=>a+Number(e.value),0);
      html += `<div class="venc-separator"><div class="venc-line"></div><span class="venc-label">📅 Vencimento Dia 20</span><div class="venc-line"></div><span class="venc-total">${fmt(t20f)}</span></div>`;
      exp20.forEach(e => html += renderExpense(e));
    }

    if (exp05.length > 0) {
      const t05f = exp05.reduce((a,e)=>a+Number(e.value),0);
      html += `<div class="venc-separator"><div class="venc-line"></div><span class="venc-label">📅 Vencimento Dia 05</span><div class="venc-line"></div><span class="venc-total">${fmt(t05f)}</span></div>`;
      exp05.forEach(e => html += renderExpense(e));
    }

    html += `</div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function renderExpense(e) {
  const cat = catById(e.cat);
  return `<div class="expense-item ${e.paid?'paid':''}" onclick="openEdit('${e.id}')">
    <div class="cat-dot" style="background:${cat.color}20;color:${cat.color}">${cat.emoji}</div>
    <div class="expense-info">
      <div class="expense-desc">${e.desc || cat.label}</div>
      <div class="expense-meta">
        <span>${cat.label}</span>
        ${e.parcel ? `<span class="parcel">${e.parcel}</span>` : ''}
        ${e.paid ? '<span class="paid-badge">Pago</span>' : '<span class="unpaid-badge">A pagar</span>'}
      </div>
    </div>
    <div class="expense-right">
      <div class="expense-value">${fmt(e.value)}</div>
      <div class="expense-payment">${e.payment || ''}</div>
    </div>
  </div>`;
}

function fmt(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// =====================
// NAVIGATION
// =====================
function switchUser(u) { state.user = u; state.filterCat = 'all'; render(); }
function prevMonth() { state.month--; if(state.month<0){state.month=11;state.year--;} state.filterCat='all'; render(); }
function nextMonth() { state.month++; if(state.month>11){state.month=0;state.year++;} state.filterCat='all'; render(); }
function filterCat(cat) { state.filterCat = cat; render(); }

// =====================
// SALARY INLINE EDIT
// =====================
function editSalaryCard(v) {
  document.getElementById('sc'+v).classList.add('editing');
  document.getElementById('si'+v).focus();
  document.getElementById('si'+v).select();
}
function saveSalaryCard(v) {
  const md = getMonthData();
  const ud = md[state.user];
  const val = parseFloat(document.getElementById('si'+v).value)||0;
  if(v==='20') ud.salary20 = val; else ud.salary05 = val;
  document.getElementById('sc'+v).classList.remove('editing');
  saveData(); render();
}

// =====================
// MODAL
// =====================
let selectedCat = 'casa';
let formUser = 'vitoria';

function openAddModal() {
  formUser = state.user;
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = '➕ Novo lançamento';
  document.getElementById('expense-form').reset();
  document.getElementById('btn-delete').style.display = 'none';
  selectedCat = 'casa';
  renderCatPicker();
  updateUserBtns();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id) {
  const md = getMonthData();
  const exp = md[state.user].expenses.find(e=>e.id===id);
  if(!exp) return;
  formUser = state.user;
  document.getElementById('edit-id').value = id;
  document.getElementById('modal-title').textContent = '✏️ Editar lançamento';
  document.getElementById('f-desc').value = exp.desc;
  document.getElementById('f-value').value = exp.value;
  document.getElementById('f-venc').value = exp.venc;
  document.getElementById('f-payment').value = exp.payment||'';
  document.getElementById('f-parcel').value = exp.parcel||'';
  document.getElementById('f-paid').checked = exp.paid||false;
  selectedCat = exp.cat;
  document.getElementById('btn-delete').style.display = 'block';
  renderCatPicker();
  updateUserBtns();
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if(e.target===document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('open');
}

function renderCatPicker() {
  const container = document.getElementById('cat-picker');
  container.innerHTML = CATEGORIES.map(cat =>
    `<button type="button" class="cat-btn ${cat.id===selectedCat?'selected':''}" onclick="selectCat('${cat.id}')">
      <span class="emoji">${cat.emoji}</span>${cat.label}
    </button>`
  ).join('');
}

function selectCat(id) { selectedCat = id; renderCatPicker(); }
function selectFormUser(u) { formUser = u; updateUserBtns(); }
function updateUserBtns() {
  document.getElementById('user-btn-vitoria').className = `cat-btn ${formUser==='vitoria'?'selected':''}`;
  document.getElementById('user-btn-geo').className = `cat-btn ${formUser==='geo'?'selected':''}`;
}

function saveExpense(ev) {
  ev.preventDefault();
  const md = getMonthData();
  const ud = md[formUser];
  const editId = document.getElementById('edit-id').value;
  const expense = {
    id: editId || uid(),
    cat: selectedCat,
    desc: document.getElementById('f-desc').value.trim(),
    value: parseFloat(document.getElementById('f-value').value)||0,
    venc: document.getElementById('f-venc').value,
    payment: document.getElementById('f-payment').value.trim(),
    parcel: document.getElementById('f-parcel').value.trim(),
    paid: document.getElementById('f-paid').checked,
  };
  if (editId) {
    // Find in any user
    let found = false;
    ['vitoria','geo'].forEach(u => {
      const idx = md[u].expenses.findIndex(e=>e.id===editId);
      if(idx>=0) { md[u].expenses.splice(idx,1); found=true; }
    });
    ud.expenses.push(expense);
  } else {
    ud.expenses.push(expense);
  }
  saveData();
  document.getElementById('modal-overlay').classList.remove('open');
  render();
  showToast(editId ? 'Lançamento atualizado! ✅' : 'Lançamento adicionado! ✅');
}

function deleteExpense() {
  if(!confirm('Excluir este lançamento?')) return;
  const editId = document.getElementById('edit-id').value;
  const md = getMonthData();
  ['vitoria','geo'].forEach(u => {
    const idx = md[u].expenses.findIndex(e=>e.id===editId);
    if(idx>=0) md[u].expenses.splice(idx,1);
  });
  saveData();
  document.getElementById('modal-overlay').classList.remove('open');
  render();
  showToast('Excluído! 🗑');
}

// =====================
// SALARY MODAL
// =====================
function showSalaryModal() {
  const md = getMonthData();
  const d = md[state.user];
  document.getElementById('salary-form-content').innerHTML = `
    <div class="form-group">
      <label class="form-label">Salário Dia 20</label>
      <input type="number" class="form-input" id="sm20" value="${d.salary20}" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Salário Dia 05</label>
      <input type="number" class="form-input" id="sm05" value="${d.salary05}" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Renda extra</label>
      <input type="number" class="form-input" id="smex" value="${d.extra||0}" step="0.01">
    </div>`;
  document.getElementById('salary-modal-overlay').classList.add('open');
}
function closeSalaryModal(e) {
  if(e.target===document.getElementById('salary-modal-overlay')) document.getElementById('salary-modal-overlay').classList.remove('open');
}
function saveSalaries() {
  const md = getMonthData();
  const d = md[state.user];
  d.salary20 = parseFloat(document.getElementById('sm20').value)||0;
  d.salary05 = parseFloat(document.getElementById('sm05').value)||0;
  d.extra = parseFloat(document.getElementById('smex').value)||0;
  saveData();
  document.getElementById('salary-modal-overlay').classList.remove('open');
  render();
  showToast('Salários salvos! 💰');
}

// =====================
// TOAST
// =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// =====================
// INIT
// =====================
loadData();
// Set current month
const now = new Date();
state.year = now.getFullYear();
state.month = now.getMonth();
render();
</script>
</body>
</html>
