<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icon_16.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon_192.png">
<meta name="theme-color" content="#6C5CE7">
<title>Finanças do Casal 💑</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #a29bfe;
    --primary-dark: #4a3cbf;
    --success: #00b894;
    --secondary-light: #55efc4;
    --vi-light: #fab1d3;
    --geo-light: #74b9ff;
    --bg: #f7f6fc;
    --surface: #ffffff;
    --surface2: #f0effe;
    --border: rgba(108,92,231,0.12);
    --text: #2d2a3e;
    --text2: #6b6580;
    --text3: #9e98b8;
    --danger: #d63031;
    --warning: #fdcb6e;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 2px 8px rgba(108,92,231,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* HEADER */
  .app-header { background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 100%); color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(108,92,231,0.25); }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; }
  .app-title { font-size: 20px; font-weight: 700; }
  .app-title span { opacity: 0.75; font-weight: 400; font-size: 13px; display: block; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 18px; transition: background 0.2s; }
  .btn-icon:hover { background: rgba(255,255,255,0.3); }
  .sync-dot { width: 9px; height: 9px; border-radius: 50%; background: #55efc4; box-shadow: 0 0 6px #55efc4; transition: all 0.3s; flex-shrink: 0; }
  .sync-dot.syncing { background: #fdcb6e; box-shadow: 0 0 6px #fdcb6e; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ff7675; box-shadow: 0 0 6px #ff7675; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .user-tabs { display: flex; margin: 12px 20px 0; background: rgba(0,0,0,0.12); border-radius: 12px 12px 0 0; overflow: hidden; }
  .user-tab { flex: 1; padding: 10px 16px; border: none; background: transparent; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .user-tab.active { background: rgba(255,255,255,0.2); color: white; }
  .user-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .user-tab.vitoria .dot { background: var(--vi-light); }
  .user-tab.geo .dot { background: var(--geo-light); }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 20px 14px; }
  .month-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 16px; transition: background 0.2s; }
  .month-btn:hover { background: rgba(255,255,255,0.35); }
  .month-label { font-size: 15px; font-weight: 600; color: white; min-width: 140px; text-align: center; }

  /* MAIN */
  .main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* SALARY */
  .salary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .salary-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.2s; }
  .salary-card:hover { border-color: var(--primary-light); }
  .salary-card .slabel { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .salary-card .sval { font-size: 18px; font-weight: 700; color: var(--text); }
  .salary-card .sedit { font-size: 11px; color: var(--primary); margin-top: 2px; }
  .salary-card .sinput { display: none; width: 100%; border: none; outline: none; font-size: 18px; font-weight: 700; color: var(--primary); background: transparent; font-family: inherit; }
  .salary-card.editing .sinput { display: block; }
  .salary-card.editing .sval, .salary-card.editing .sedit { display: none; }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .summary-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .summary-card.full { grid-column: 1/-1; }
  .summary-card .label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
  .summary-card .value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .summary-card .value.positive { color: var(--success); }
  .summary-card .value.negative { color: var(--danger); }
  .summary-card .value.neutral { color: var(--text); }
  .summary-card .sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* SALDO POR DIA */
  .saldo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .saldo-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); position: relative; overflow: hidden; }
  .saldo-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .saldo-card.dia20::before { background: linear-gradient(90deg,#6C5CE7,#a29bfe); }
  .saldo-card.dia05::before { background: linear-gradient(90deg,#00b894,#55efc4); }
  .saldo-card .sd-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .saldo-card.dia20 .sd-badge { background:#f0effe; color:#6C5CE7; }
  .saldo-card.dia05 .sd-badge { background:#e8f8f2; color:#00b894; }
  .saldo-card .sd-date { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:6px; }
  .saldo-card .sd-income { font-size:13px; color:var(--text3); margin-bottom:2px; }
  .saldo-card .sd-spent { font-size:13px; color:var(--text3); margin-bottom:6px; }
  .saldo-card .sd-balance { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .saldo-card .sd-balance.pos { color: var(--success); }
  .saldo-card .sd-balance.neg { color: var(--danger); }
  .saldo-card .sd-sub { font-size:11px; color:var(--text3); margin-top:3px; }

  /* PROGRESS BAR (usada dentro dos cards) */
  .bar-track { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .bar-fill.ok { background: linear-gradient(90deg, var(--success), #55efc4); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--warning), #f39c12); }
  .bar-fill.over { background: linear-gradient(90deg, var(--danger), #ff7675); }

  /* CATEGORIES */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .cat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .cat-card .cat-icon { font-size: 22px; margin-bottom: 6px; }
  .cat-card .cat-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .cat-card .cat-amount { font-size: 15px; font-weight: 700; color: var(--text); }
  .cat-card .cat-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
  .cat-card .cat-fill { height: 100%; border-radius: 2px; }

  /* SECTION */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 12px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .btn-add { background: var(--primary); color: white; border: none; border-radius: 24px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(108,92,231,0.3); transition: all 0.2s; }
  .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); }

  /* FILTER CHIPS */
  .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .chip.active { background: var(--primary); border-color: var(--primary); color: white; }
  .chip:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); }

  /* EXPENSES */
  .expense-list { display: flex; flex-direction: column; gap: 8px; }
  .expense-item { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .expense-item:hover { border-color: var(--primary-light); }
  .expense-item.paid { opacity: 0.55; }
  .cat-dot { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-desc { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 12px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .parcel { background: var(--surface2); border-radius: 6px; padding: 1px 6px; color: var(--primary); font-weight: 600; font-size: 11px; }
  .expense-right { text-align: right; flex-shrink: 0; }
  .expense-value { font-size: 15px; font-weight: 700; }
  .expense-payment { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .paid-badge { background: #e8f8f2; color: var(--success); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }
  .unpaid-badge { background: #fff3e0; color: #f39c12; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }

  .venc-separator { display: flex; align-items: center; gap: 10px; margin: 16px 0 10px; }
  .venc-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .venc-line { flex: 1; height: 1px; background: var(--border); }
  .venc-total { font-size: 12px; font-weight: 700; color: var(--primary); white-space: nowrap; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 520px; padding: 20px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; background: var(--bg); cursor: pointer; text-align: center; transition: all 0.2s; font-size: 12px; color: var(--text2); }
  .cat-btn .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-btn:hover { border-color: var(--primary-light); background: var(--surface2); }
  .cat-btn.selected { border-color: var(--primary); background: var(--surface2); color: var(--primary); font-weight: 600; }
  .btn-save { width: 100%; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
  .btn-save:hover { background: var(--primary-dark); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-delete { width: 100%; background: transparent; color: var(--danger); border: 1.5px solid #fad; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn-delete:hover { background: #fff5f5; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .toggle-label { font-size: 14px; color: var(--text2); }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
  .toggle-slider::before { content:''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; background: linear-gradient(135deg, #6C5CE7, #a29bfe); color: white; border: none; border-radius: 20px; width: 58px; height: 58px; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 24px rgba(108,92,231,0.4); transition: all 0.2s; z-index: 150; }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(0.95); }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* EMPTY / LOADING */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 14px; color: var(--text3); font-size: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (min-width: 600px) {
    .main { padding: 24px; }
    .cat-picker { grid-template-columns: repeat(6, 1fr); }
    .modal { border-radius: 24px; margin: 20px; width: calc(100% - 40px); }
    .modal-overlay { align-items: center; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .summary-grid { grid-template-columns: repeat(4, 1fr); }
    .cat-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">
      💑 Finanças do Casal
      <span id="sync-status-text">Conectando...</span>
    </div>
    <div class="header-actions">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <button class="btn-icon" onclick="showSalaryModal()" title="Salários">💰</button>
    </div>
  </div>
  <div class="user-tabs">
    <button class="user-tab vitoria active" onclick="switchUser('vitoria')">
      <span class="dot"></span> Vitória
    </button>
    <button class="user-tab geo" onclick="switchUser('geo')">
      <span class="dot"></span> Geovanne
    </button>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="prevMonth()">‹</button>
    <span class="month-label" id="month-label">—</span>
    <button class="month-btn" onclick="nextMonth()">›</button>
  </div>
</header>

<main class="main" id="main-content">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span>Conectando ao Firebase...</span>
  </div>
</main>

<button class="fab" onclick="openAddModal()">+</button>

<!-- Expense Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event,'modal-overlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">➕ Novo lançamento</div>
    <form id="expense-form" onsubmit="saveExpense(event)">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <div style="display:flex;gap:10px">
          <button type="button" class="cat-btn" id="ubtn-vitoria" onclick="selectFormUser('vitoria')" style="flex:1;display:flex;flex-direction:column;align-items:center">
            <span class="emoji">👩</span>Vitória
          </button>
          <button type="button" class="cat-btn" id="ubtn-geo" onclick="selectFormUser('geo')" style="flex:1;display:flex;flex-direction:column;align-items:center">
            <span class="emoji">👨</span>Geovanne
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Categoria</label>
        <div class="cat-picker" id="cat-picker"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <input type="text" class="form-input" id="f-desc" placeholder="Ex: Mercado, Uber, Netflix..." required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Valor (R$)</label>
          <input type="number" class="form-input" id="f-value" placeholder="0,00" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label class="form-label">Vencimento</label>
          <select class="form-select" id="f-venc">
            <option value="20">Dia 20</option>
            <option value="05">Dia 05</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Pagamento</label>
          <input type="text" class="form-input" id="f-payment" placeholder="PIX, Nubank...">
        </div>
        <div class="form-group">
          <label class="form-label">Parcela</label>
          <input type="text" class="form-input" id="f-parcel" placeholder="Ex: 2/6">
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Já pago?</span>
        <label class="toggle"><input type="checkbox" id="f-paid"><span class="toggle-slider"></span></label>
      </div>
      <button type="submit" class="btn-save" id="btn-save-exp">💾 Salvar</button>
      <button type="button" class="btn-delete" id="btn-delete" onclick="deleteExpense()" style="display:none">🗑 Excluir lançamento</button>
    </form>
  </div>
</div>

<!-- Salary Modal -->
<div class="modal-overlay" id="salary-modal-overlay" onclick="handleOverlayClick(event,'salary-modal-overlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">💰 Salários — <span id="salary-modal-username"></span></div>
    <div id="salary-form-content"></div>
    <button class="btn-save" id="btn-save-salary" onclick="saveSalaries()">Salvar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ─── FIREBASE CONFIG ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAJEEpERf29yLXTsQyb0M-FVsk-_UjWdOQ",
  authDomain: "gestor-financeiro-9ee9e.firebaseapp.com",
  databaseURL: "https://gestor-financeiro-9ee9e-default-rtdb.firebaseio.com",
  projectId: "gestor-financeiro-9ee9e",
  storageBucket: "gestor-financeiro-9ee9e.firebasestorage.app",
  messagingSenderId: "823405359954",
  appId: "1:823405359954:web:0ae778478207f9e8c0c08b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ─── CONSTANTS ────────────────────────────────────────────────────
const MONTHS     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTH_KEYS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const CATEGORIES = [
  { id:'casa',        emoji:'🏠', label:'Casa',        color:'#0984e3' },
  { id:'saude',       emoji:'💊', label:'Saúde',       color:'#e17055' },
  { id:'necessidade', emoji:'🛒', label:'Necessidade', color:'#00b894' },
  { id:'bem-estar',   emoji:'✨', label:'Bem-estar',   color:'#a29bfe' },
  { id:'presente',    emoji:'🎁', label:'Presente',    color:'#fd79a8' },
  { id:'investimento',emoji:'📈', label:'Invest.',     color:'#00cec9' },
  { id:'igreja',      emoji:'⛪', label:'Igreja',      color:'#6c5ce7' },
  { id:'dividas',     emoji:'💳', label:'Dívidas',     color:'#d63031' },
  { id:'educacao',    emoji:'📚', label:'Educação',    color:'#fdcb6e' },
  { id:'diversao',    emoji:'🎉', label:'Diversão',    color:'#e84393' },
  { id:'outros',      emoji:'📦', label:'Outros',      color:'#b2bec3' },
];
function catById(id){ return CATEGORIES.find(c=>c.id===id)||CATEGORIES[CATEGORIES.length-1]; }

// ─── STATE ────────────────────────────────────────────────────────
const now = new Date();
let state = { user:'vitoria', year:now.getFullYear(), month:now.getMonth(), filterCat:'all' };
let monthData = null;
let activeRef = null;
let activeCallback = null;

function monthKey(){ return `${state.year}_${MONTH_KEYS[state.month]}`; }
function dbPath()  { return `financas/${monthKey()}`; }

const DEFAULT_MONTH = () => ({
  vitoria:{ salary20:0, salary05:0, extra:0, expenses:{} },
  geo:    { salary20:0, salary05:0, extra:0, expenses:{} }
});

// ─── FIREBASE REALTIME LISTENER ───────────────────────────────────
function attachListener(){
  // Desanexar listener anterior corretamente
  if(activeRef && activeCallback){
    activeRef.off('value', activeCallback);
  }
  activeRef = null;
  activeCallback = null;
  monthData = null;
  setSyncStatus('syncing');
  render(); // mostra loading enquanto aguarda Firebase

  activeRef = db.ref(dbPath());
  activeCallback = function(snap){
    monthData = snap.val() || DEFAULT_MONTH();
    ['vitoria','geo'].forEach(u=>{
      if(!monthData[u]) monthData[u] = DEFAULT_MONTH()[u];
      if(!monthData[u].expenses) monthData[u].expenses = {};
    });
    setSyncStatus('ok');
    render();
  };
  activeRef.on('value', activeCallback, function(err){
    console.error(err);
    setSyncStatus('error');
    showToast('⚠️ Erro de conexão com Firebase');
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────
function uid(){ return db.ref().push().key; }

// Lógica de datas dos pagamentos:
// Mês visualizado = mês de referência do salário
// Dia 20: adiantamento pago em 20 do mês ANTERIOR
// Dia 05: restante pago em 05 do próprio mês
function paymentDates(){
  const m = state.month; // 0-indexed
  const y = state.year;
  const prev  = m === 0 ? 11 : m - 1;
  const prevY = m === 0 ? y - 1 : y;
  return {
    label20: `Dia 20 de ${MONTHS[prev]}`,
    sub20:   'Adiantamento',
    label05: `Dia 05 de ${MONTHS[m]}`,
    sub05:   'Restante do salário',
  };
}

function setSyncStatus(s){
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-status-text');
  if(!dot) return;
  dot.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
  text.textContent = s==='ok' ? '🟢 Tempo real' : s==='syncing' ? 'Sincronizando...' : '🔴 Sem conexão';
}

function fmt(v){
  return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function handleOverlayClick(e,id){
  if(e.target.id===id) document.getElementById(id).classList.remove('open');
}

// ─── RENDER ───────────────────────────────────────────────────────
function render(){
  document.getElementById('month-label').textContent = `${MONTHS[state.month]} ${state.year}`;
  document.querySelectorAll('.user-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.user-tab.${state.user}`).classList.add('active');

  if(!monthData){ document.getElementById('main-content').innerHTML=`<div class="loading-screen"><div class="spinner"></div><span>Carregando...</span></div>`; return; }

  const ud     = monthData[state.user];
  const allExp = Object.values(ud.expenses||{});
  const filtered = state.filterCat==='all' ? allExp : allExp.filter(e=>e.cat===state.filterCat);
  const exp20  = filtered.filter(e=>e.venc==='20');
  const exp05  = filtered.filter(e=>e.venc==='05');
  const total20= allExp.filter(e=>e.venc==='20').reduce((a,e)=>a+Number(e.value),0);
  const total05= allExp.filter(e=>e.venc==='05').reduce((a,e)=>a+Number(e.value),0);
  const income = Number(ud.salary20||0)+Number(ud.salary05||0)+Number(ud.extra||0);
  const spent  = total20+total05;
  const balance= income-spent;
  const pct    = income>0 ? Math.min(100,(spent/income)*100) : 0;

  const catTotals={};
  allExp.forEach(e=>{ catTotals[e.cat]=(catTotals[e.cat]||0)+Number(e.value); });
  const maxCat = Math.max(...Object.values(catTotals),1);

  let h='';

  // Salary cards
  h+=`<div class="salary-grid">
    <div class="salary-card" id="sc20" onclick="editSalaryCard('20')">
      <div class="slabel">💼 Salário Dia 20</div>
      <div class="sval">${fmt(ud.salary20)}</div><div class="sedit">Toque para editar</div>
      <input class="sinput" id="si20" type="number" value="${ud.salary20||0}" onblur="saveSalaryCard('20')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
    <div class="salary-card" id="sc05" onclick="editSalaryCard('05')">
      <div class="slabel">💼 Salário Dia 05</div>
      <div class="sval">${fmt(ud.salary05)}</div><div class="sedit">Toque para editar</div>
      <input class="sinput" id="si05" type="number" value="${ud.salary05||0}" onblur="saveSalaryCard('05')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
  </div>`;

  // Saldos por dia
  const pd = paymentDates();
  const bal20  = Number(ud.salary20||0) - total20;
  const bal05  = Number(ud.salary05||0) + Number(ud.extra||0) - total05;
  const bc=pct<80?'ok':pct<100?'warn':'over';

  // Card total do mês (full width)
  h+=`<div class="summary-grid">
    <div class="summary-card"><div class="label">Renda total</div><div class="value neutral">${fmt(income)}</div><div class="sub">Adiantamento + restante</div></div>
    <div class="summary-card"><div class="label">Total gasto</div><div class="value ${pct>=100?'negative':'neutral'}">${fmt(spent)}</div><div class="sub">${pct.toFixed(0)}% da renda</div></div>
    <div class="summary-card full">
      <div class="label">Saldo total do mês</div>
      <div class="value ${balance>=0?'positive':'negative'}">${balance>=0?'+':''}${fmt(balance)}</div>
      <div class="sub">${balance>=0?'🟢 Dentro do limite':'🔴 Acima da renda'}</div>
      <div class="bar-track" style="margin-top:10px"><div class="bar-fill ${bc}" style="width:${Math.min(pct,100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-size:11px;color:var(--text3)">Gastos</span>
        <span style="font-size:11px;color:var(--text3)">${pct.toFixed(0)}% da renda</span>
      </div>
    </div>
  </div>`;

  // Cards de saldo por dia
  h+=`<div class="saldo-grid">
    <div class="saldo-card dia20">
      <span class="sd-badge">Adiantamento</span>
      <div class="sd-date">📅 ${pd.label20}</div>
      <div class="sd-income">Recebido: ${fmt(ud.salary20)}</div>
      <div class="sd-spent">Gastos: ${fmt(total20)}</div>
      <div class="sd-balance ${bal20>=0?'pos':'neg'}">${bal20>=0?'+':''}${fmt(bal20)}</div>
      <div class="sd-sub">${bal20>=0?'Disponível neste dia':'Estourou neste dia'}</div>
    </div>
    <div class="saldo-card dia05">
      <span class="sd-badge">Restante</span>
      <div class="sd-date">📅 ${pd.label05}</div>
      <div class="sd-income">Recebido: ${fmt(Number(ud.salary05||0)+Number(ud.extra||0))}</div>
      <div class="sd-spent">Gastos: ${fmt(total05)}</div>
      <div class="sd-balance ${bal05>=0?'pos':'neg'}">${bal05>=0?'+':''}${fmt(bal05)}</div>
      <div class="sd-sub">${bal05>=0?'Disponível neste dia':'Estourou neste dia'}</div>
    </div>
  </div>`;

  // Category breakdown
  if(Object.keys(catTotals).length){
    h+=`<div class="section-header"><div class="section-title">📊 Por categoria</div></div><div class="cat-grid">`;
    CATEGORIES.forEach(cat=>{
      if(!catTotals[cat.id]) return;
      h+=`<div class="cat-card">
        <div class="cat-icon">${cat.emoji}</div>
        <div class="cat-name">${cat.label}</div>
        <div class="cat-amount">${fmt(catTotals[cat.id])}</div>
        <div class="cat-bar"><div class="cat-fill" style="width:${(catTotals[cat.id]/maxCat)*100}%;background:${cat.color}"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Filter chips
  h+=`<div class="section-header">
    <div class="section-title">📋 Lançamentos</div>
    <button class="btn-add" onclick="openAddModal()"><span style="font-size:20px;line-height:1">+</span> Novo</button>
  </div>
  <div class="filter-bar">
    <button class="chip ${state.filterCat==='all'?'active':''}" onclick="filterCat('all')">Todos (${allExp.length})</button>`;
  CATEGORIES.forEach(cat=>{
    const cnt=allExp.filter(e=>e.cat===cat.id).length;
    if(cnt>0) h+=`<button class="chip ${state.filterCat===cat.id?'active':''}" onclick="filterCat('${cat.id}')">${cat.emoji} ${cat.label} (${cnt})</button>`;
  });
  h+=`</div>`;

  // Expense list
  if(!filtered.length){
    h+=`<div class="empty-state"><div class="icon">📭</div><p>Sem lançamentos aqui.<br>Toque em <b>+</b> para adicionar.</p></div>`;
  } else {
    h+=`<div class="expense-list">`;
    [[exp20,'20'],[exp05,'05']].forEach(([list,day])=>{
      if(!list.length) return;
      const tot=list.reduce((a,e)=>a+Number(e.value),0);
      h+=`<div class="venc-separator"><div class="venc-line"></div><span class="venc-label">📅 Vencimento Dia ${day}</span><div class="venc-line"></div><span class="venc-total">${fmt(tot)}</span></div>`;
      list.forEach(e=>{ h+=renderExpense(e); });
    });
    h+=`</div>`;
  }

  document.getElementById('main-content').innerHTML=h;
}

function renderExpense(e){
  const cat=catById(e.cat);
  return `<div class="expense-item ${e.paid?'paid':''}" onclick="openEdit('${e.id}','${e._owner}')">
    <div class="cat-dot" style="background:${cat.color}20;color:${cat.color}">${cat.emoji}</div>
    <div class="expense-info">
      <div class="expense-desc">${escHtml(e.desc||cat.label)}</div>
      <div class="expense-meta">
        <span>${cat.label}</span>
        ${e.parcel?`<span class="parcel">${escHtml(e.parcel)}</span>`:''}
        ${e.paid?'<span class="paid-badge">Pago</span>':'<span class="unpaid-badge">A pagar</span>'}
      </div>
    </div>
    <div class="expense-right">
      <div class="expense-value">${fmt(e.value)}</div>
      <div class="expense-payment">${escHtml(e.payment||'')}</div>
    </div>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── NAVIGATION ───────────────────────────────────────────────────
function switchUser(u){ state.user=u; state.filterCat='all'; render(); }
function filterCat(c){ state.filterCat=c; render(); }
function prevMonth(){
  state.month--; if(state.month<0){state.month=11;state.year--;}
  state.filterCat='all';
  attachListener();
}
function nextMonth(){
  state.month++; if(state.month>11){state.month=0;state.year++;}
  state.filterCat='all';
  attachListener();
}

// ─── SALARY INLINE ────────────────────────────────────────────────
function editSalaryCard(v){
  document.getElementById('sc'+v).classList.add('editing');
  const inp=document.getElementById('si'+v);
  inp.focus(); inp.select();
}
function saveSalaryCard(v){
  document.getElementById('sc'+v).classList.remove('editing');
  const val=parseFloat(document.getElementById('si'+v).value)||0;
  const field = v==='20'?'salary20':'salary05';
  db.ref(`${dbPath()}/${state.user}/${field}`).set(val)
    .then(()=>showToast('💰 Salário salvo!'))
    .catch(()=>showToast('⚠️ Erro ao salvar'));
}

// ─── MODAL ────────────────────────────────────────────────────────
let selCat='casa', formUser='vitoria';

function openAddModal(){
  formUser=state.user;
  document.getElementById('edit-id').value='';
  document.getElementById('modal-title').textContent='➕ Novo lançamento';
  document.getElementById('expense-form').reset();
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('btn-save-exp').disabled=false;
  document.getElementById('btn-save-exp').textContent='💾 Salvar';
  selCat='casa'; renderCatPicker(); updateUBtns();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEdit(id, owner){
  const u = owner || state.user;
  const exp = (monthData[u]?.expenses||{})[id];
  if(!exp) return;
  formUser=u;
  document.getElementById('edit-id').value=id;
  document.getElementById('modal-title').textContent='✏️ Editar lançamento';
  document.getElementById('f-desc').value=exp.desc||'';
  document.getElementById('f-value').value=exp.value||'';
  document.getElementById('f-venc').value=exp.venc||'20';
  document.getElementById('f-payment').value=exp.payment||'';
  document.getElementById('f-parcel').value=exp.parcel||'';
  document.getElementById('f-paid').checked=!!exp.paid;
  selCat=exp.cat||'outros';
  document.getElementById('btn-delete').style.display='block';
  document.getElementById('btn-save-exp').disabled=false;
  document.getElementById('btn-save-exp').textContent='💾 Salvar';
  renderCatPicker(); updateUBtns();
  document.getElementById('modal-overlay').classList.add('open');
}

function renderCatPicker(){
  document.getElementById('cat-picker').innerHTML=CATEGORIES.map(c=>
    `<button type="button" class="cat-btn ${c.id===selCat?'selected':''}" onclick="selectCat('${c.id}')">
      <span class="emoji">${c.emoji}</span>${c.label}
    </button>`).join('');
}
function selectCat(id){ selCat=id; renderCatPicker(); }
function selectFormUser(u){ formUser=u; updateUBtns(); }
function updateUBtns(){
  ['vitoria','geo'].forEach(u=>{
    document.getElementById('ubtn-'+u).className=`cat-btn${formUser===u?' selected':''}`;
    document.getElementById('ubtn-'+u).style.cssText='flex:1;display:flex;flex-direction:column;align-items:center';
  });
}

function saveExpense(ev){
  ev.preventDefault();
  const btn=document.getElementById('btn-save-exp');
  btn.disabled=true; btn.textContent='⏳ Salvando...';
  const editId=document.getElementById('edit-id').value;
  const id=editId||uid();
  const expense={
    id, _owner:formUser,
    cat:selCat,
    desc:document.getElementById('f-desc').value.trim(),
    value:parseFloat(document.getElementById('f-value').value)||0,
    venc:document.getElementById('f-venc').value,
    payment:document.getElementById('f-payment').value.trim(),
    parcel:document.getElementById('f-parcel').value.trim(),
    paid:document.getElementById('f-paid').checked,
  };

  // If editing and user changed → delete from old owner
  const promises=[];
  if(editId){
    ['vitoria','geo'].forEach(u=>{
      if((monthData[u]?.expenses||{})[editId])
        promises.push(db.ref(`${dbPath()}/${u}/expenses/${editId}`).remove());
    });
  }
  Promise.all(promises)
    .then(()=>db.ref(`${dbPath()}/${formUser}/expenses/${id}`).set(expense))
    .then(()=>{ document.getElementById('modal-overlay').classList.remove('open'); showToast(editId?'✅ Atualizado!':'✅ Adicionado!'); })
    .catch(()=>{ btn.disabled=false; btn.textContent='💾 Salvar'; showToast('⚠️ Erro ao salvar'); });
}

function deleteExpense(){
  if(!confirm('Excluir este lançamento?')) return;
  const id=document.getElementById('edit-id').value;
  const deletes=['vitoria','geo'].filter(u=>(monthData[u]?.expenses||{})[id])
    .map(u=>db.ref(`${dbPath()}/${u}/expenses/${id}`).remove());
  Promise.all(deletes)
    .then(()=>{ document.getElementById('modal-overlay').classList.remove('open'); showToast('🗑 Excluído!'); })
    .catch(()=>showToast('⚠️ Erro ao excluir'));
}

// ─── SALARY MODAL ─────────────────────────────────────────────────
function showSalaryModal(){
  const ud=monthData?.[state.user]||{};
  const nome=state.user==='vitoria'?'Vitória':'Geovanne';
  document.getElementById('salary-modal-username').textContent=nome;
  document.getElementById('salary-form-content').innerHTML=`
    <div class="form-group"><label class="form-label">Salário Dia 20</label><input type="number" class="form-input" id="sm20" value="${ud.salary20||0}" step="0.01"></div>
    <div class="form-group"><label class="form-label">Salário Dia 05</label><input type="number" class="form-input" id="sm05" value="${ud.salary05||0}" step="0.01"></div>
    <div class="form-group"><label class="form-label">Renda extra</label><input type="number" class="form-input" id="smex" value="${ud.extra||0}" step="0.01"></div>`;
  document.getElementById('salary-modal-overlay').classList.add('open');
}
function saveSalaries(){
  const btn=document.getElementById('btn-save-salary');
  btn.disabled=true; btn.textContent='⏳ Salvando...';
  const updates={
    [`${dbPath()}/${state.user}/salary20`]: parseFloat(document.getElementById('sm20').value)||0,
    [`${dbPath()}/${state.user}/salary05`]: parseFloat(document.getElementById('sm05').value)||0,
    [`${dbPath()}/${state.user}/extra`]:    parseFloat(document.getElementById('smex').value)||0,
  };
  db.ref().update(updates)
    .then(()=>{ document.getElementById('salary-modal-overlay').classList.remove('open'); showToast('💰 Salários salvos!'); })
    .catch(()=>showToast('⚠️ Erro ao salvar'))
    .finally(()=>{ btn.disabled=false; btn.textContent='Salvar'; });
}

// ─── INIT ─────────────────────────────────────────────────────────
attachListener();
</script>
</body>
</html>
