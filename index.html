<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/icon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/icon_16.png">
<link rel="apple-touch-icon" sizes="192x192" href="./assets/icon_192.png">
<meta name="theme-color" content="#6C5CE7">
<title>Finanças do Casal 💑</title>
<style>
  :root {
    --primary: #6C5CE7;
    --primary-light: #a29bfe;
    --primary-dark: #4a3cbf;
    --success: #00b894;
    --secondary-light: #55efc4;
    --vi-light: #fab1d3;
    --geo-light: #74b9ff;
    --bg: #f7f6fc;
    --surface: #ffffff;
    --surface2: #f0effe;
    --border: rgba(108,92,231,0.12);
    --text: #2d2a3e;
    --text2: #6b6580;
    --text3: #9e98b8;
    --danger: #d63031;
    --warning: #fdcb6e;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 2px 8px rgba(108,92,231,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }

  /* HEADER */
  .app-header { background: linear-gradient(135deg, #6C5CE7 0%, #a29bfe 100%); color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(108,92,231,0.25); }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; }
  .app-title { font-size: 20px; font-weight: 700; }
  .app-title span { opacity: 0.75; font-weight: 400; font-size: 13px; display: block; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 18px; transition: background 0.2s; }
  .btn-icon:hover { background: rgba(255,255,255,0.3); }
  .sync-dot { width: 9px; height: 9px; border-radius: 50%; background: #55efc4; box-shadow: 0 0 6px #55efc4; transition: all 0.3s; flex-shrink: 0; }
  .sync-dot.syncing { background: #fdcb6e; box-shadow: 0 0 6px #fdcb6e; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ff7675; box-shadow: 0 0 6px #ff7675; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  .user-tabs { display: flex; margin: 12px 20px 0; background: rgba(0,0,0,0.12); border-radius: 12px 12px 0 0; overflow: hidden; }
  .user-tab { flex: 1; padding: 10px 16px; border: none; background: transparent; color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .user-tab.active { background: rgba(255,255,255,0.2); color: white; }
  .user-tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .user-tab.vitoria .dot { background: var(--vi-light); }
  .user-tab.geo .dot { background: var(--geo-light); }

  .month-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 20px 14px; }
  .month-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; font-size: 16px; transition: background 0.2s; }
  .month-btn:hover { background: rgba(255,255,255,0.35); }
  .month-label { font-size: 15px; font-weight: 600; color: white; min-width: 140px; text-align: center; }

  /* MAIN */
  .main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* SALARY */
  .salary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .salary-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.2s; }
  .salary-card:hover { border-color: var(--primary-light); }
  .salary-card .slabel { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .salary-card .sval { font-size: 18px; font-weight: 700; color: var(--text); }
  .salary-card .sedit { font-size: 11px; color: var(--primary); margin-top: 2px; }
  .salary-card .sinput { display: none; width: 100%; border: none; outline: none; font-size: 18px; font-weight: 700; color: var(--primary); background: transparent; font-family: inherit; }
  .salary-card.editing .sinput { display: block; }
  .salary-card.editing .sval, .salary-card.editing .sedit { display: none; }

  /* SUMMARY */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .summary-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
  .summary-card.full { grid-column: 1/-1; }
  .summary-card .label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
  .summary-card .value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .summary-card .value.positive { color: var(--success); }
  .summary-card .value.negative { color: var(--danger); }
  .summary-card .value.neutral { color: var(--text); }
  .summary-card .sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* SALDO POR DIA */
  .saldo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .saldo-card { background: var(--surface); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); position: relative; overflow: hidden; }
  .saldo-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
  .saldo-card.dia20::before { background: linear-gradient(90deg,#6C5CE7,#a29bfe); }
  .saldo-card.dia05::before { background: linear-gradient(90deg,#00b894,#55efc4); }
  .saldo-card .sd-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
  .saldo-card.dia20 .sd-badge { background:#f0effe; color:#6C5CE7; }
  .saldo-card.dia05 .sd-badge { background:#e8f8f2; color:#00b894; }
  .saldo-card .sd-date { font-size:12px; font-weight:700; color:var(--text2); margin-bottom:6px; }
  .saldo-card .sd-income { font-size:13px; color:var(--text3); margin-bottom:2px; }
  .saldo-card .sd-spent { font-size:13px; color:var(--text3); margin-bottom:6px; }
  .saldo-card .sd-balance { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .saldo-card .sd-balance.pos { color: var(--success); }
  .saldo-card .sd-balance.neg { color: var(--danger); }
  .saldo-card .sd-sub { font-size:11px; color:var(--text3); margin-top:3px; }

  /* PROGRESS BAR (usada dentro dos cards) */
  .bar-track { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .bar-fill.ok { background: linear-gradient(90deg, var(--success), #55efc4); }
  .bar-fill.warn { background: linear-gradient(90deg, var(--warning), #f39c12); }
  .bar-fill.over { background: linear-gradient(90deg, var(--danger), #ff7675); }

  /* CATEGORIES */
  .cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .cat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .cat-card .cat-icon { font-size: 22px; margin-bottom: 6px; }
  .cat-card .cat-name { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .cat-card .cat-amount { font-size: 15px; font-weight: 700; color: var(--text); }
  .cat-card .cat-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 8px; overflow: hidden; }
  .cat-card .cat-fill { height: 100%; border-radius: 2px; }

  /* SECTION */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 12px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .btn-add { background: var(--primary); color: white; border: none; border-radius: 24px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 12px rgba(108,92,231,0.3); transition: all 0.2s; }
  .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); }

  /* FILTER CHIPS */
  .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .chip.active { background: var(--primary); border-color: var(--primary); color: white; }
  .chip:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); }

  /* EXPENSES */
  .expense-list { display: flex; flex-direction: column; gap: 8px; }
  .expense-item { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
  .expense-item:hover { border-color: var(--primary-light); }
  .expense-item.paid { opacity: 0.55; }
  .cat-dot { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .expense-info { flex: 1; min-width: 0; }
  .expense-desc { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .expense-meta { font-size: 12px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
  .parcel { background: var(--surface2); border-radius: 6px; padding: 1px 6px; color: var(--primary); font-weight: 600; font-size: 11px; }
  .expense-right { text-align: right; flex-shrink: 0; }
  .expense-value { font-size: 15px; font-weight: 700; }
  .expense-payment { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .paid-badge { background: #e8f8f2; color: var(--success); font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }
  .unpaid-badge { background: #fff3e0; color: #f39c12; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }

  .venc-separator { display: flex; align-items: center; gap: 10px; margin: 16px 0 10px; }
  .venc-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .venc-line { flex: 1; height: 1px; background: var(--border); }
  .venc-total { font-size: 12px; font-weight: 700; color: var(--primary); white-space: nowrap; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 520px; padding: 20px; max-height: 92vh; overflow-y: auto; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cat-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 4px; background: var(--bg); cursor: pointer; text-align: center; transition: all 0.2s; font-size: 12px; color: var(--text2); }
  .cat-btn .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .cat-btn:hover { border-color: var(--primary-light); background: var(--surface2); }
  .cat-btn.selected { border-color: var(--primary); background: var(--surface2); color: var(--primary); font-weight: 600; }
  .btn-save { width: 100%; background: var(--primary); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: all 0.2s; }
  .btn-save:hover { background: var(--primary-dark); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-delete { width: 100%; background: transparent; color: var(--danger); border: 1.5px solid #fad; border-radius: var(--radius-sm); padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
  .btn-delete:hover { background: #fff5f5; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
  .toggle-label { font-size: 14px; color: var(--text2); }
  .toggle { position: relative; width: 44px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 12px; cursor: pointer; transition: background 0.2s; }
  .toggle-slider::before { content:''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; background: linear-gradient(135deg, #6C5CE7, #a29bfe); color: white; border: none; border-radius: 20px; width: 58px; height: 58px; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 24px rgba(108,92,231,0.4); transition: all 0.3s; z-index: 150; }
  .fab:hover { transform: scale(1.08); }
  .fab:active { transform: scale(0.95); }
  .fab.hidden { opacity: 0; pointer-events: none; transform: scale(0.7) translateY(20px); }

  /* PARCELA FIELDS */
  .parcel-section { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 14px; border: 1px solid var(--primary-light); }
  .parcel-section .form-label { color: var(--primary); }
  .recap-badge { display:inline-block; background:#e8f8f2; color:var(--success); font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-top:6px; }

  /* TOAST */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* EMPTY / LOADING */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 14px; color: var(--text3); font-size: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NAV TABS (main navigation) */
  .nav-tabs { display: flex; margin: 0 20px; background: rgba(0,0,0,0.12); border-radius: 0; overflow: hidden; border-bottom: none; }
  .nav-tab { flex: 1; padding: 9px 8px; border: none; background: transparent; color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; letter-spacing: 0.3px; text-transform: uppercase; }
  .nav-tab.active { background: rgba(255,255,255,0.18); color: white; border-bottom: 2px solid white; }
  .nav-tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

  /* CARD SCREEN */
  .card-list-grid { display: flex; flex-direction: column; gap: 16px; }
  .cartao-block { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
  .cartao-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: linear-gradient(135deg, #2d3436 0%, #636e72 100%); color: white; cursor: pointer; }
  .cartao-chip { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 10px; font-size: 20px; }
  .cartao-info { flex: 1; }
  .cartao-name { font-size: 15px; font-weight: 700; }
  .cartao-meta { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .cartao-total { font-size: 16px; font-weight: 700; text-align: right; }
  .cartao-total-label { font-size: 10px; opacity: 0.7; text-align: right; }
  .cartao-actions { display: flex; gap: 6px; padding: 8px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .btn-cartao-action { flex: 1; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; }
  .btn-cartao-action:hover { border-color: var(--primary); color: var(--primary); }
  .btn-cartao-action.danger { color: var(--danger); }
  .btn-cartao-action.danger:hover { border-color: var(--danger); background: #fff5f5; }
  .cartao-despesas { }
  .cartao-despesa-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .cartao-despesa-item:last-child { border-bottom: none; }
  .cartao-despesa-item:hover { background: var(--surface2); }
  .cd-user-dot { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .cd-user-dot.vitoria { background: #fde8f1; }
  .cd-user-dot.geo { background: #e8f4ff; }
  .cd-user-dot.nenhum { background: var(--surface2); }
  .cd-user-dot.outros { background: #fff4d6; }
  .cd-info { flex: 1; min-width: 0; }
  .cd-desc { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cd-meta { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; gap: 8px; }
  .cd-right { text-align: right; flex-shrink: 0; }
  .cd-value { font-size: 14px; font-weight: 700; color: var(--text); }
  .cd-venc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .cd-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 5px; background: var(--surface2); color: var(--primary); }
  .empty-cartao { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }
  .new-cartao-btn { background: var(--surface); border: 2px dashed var(--primary-light); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; color: var(--primary); font-weight: 700; font-size: 14px; transition: all 0.2s; }
  .new-cartao-btn:hover { background: var(--surface2); border-color: var(--primary); }
  .cartao-summary-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .cartao-sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: var(--shadow-sm); }
  .cartao-sum-card .cslabel { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
  .cartao-sum-card .csval { font-size: 20px; font-weight: 700; color: var(--text); }

  /* RESPONSIVE */
  @media (min-width: 600px) {
    .main { padding: 24px; }
    .cat-picker { grid-template-columns: repeat(6, 1fr); }
    .modal { border-radius: 24px; margin: 20px; width: calc(100% - 40px); }
    .modal-overlay { align-items: center; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 900px) {
    .summary-grid { grid-template-columns: repeat(4, 1fr); }
    .cat-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">
      💑 Finanças do Casal
      <span id="sync-status-text">Conectando...</span>
    </div>
    <div class="header-actions">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <button class="btn-icon" onclick="showSalaryModal()" title="Salários">💰</button>
    </div>
  </div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ─── FIREBASE CONFIG ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAJEEpERf29yLXTsQyb0M-FVsk-_UjWdOQ",
  authDomain: "gestor-financeiro-9ee9e.firebaseapp.com",
  databaseURL: "https://gestor-financeiro-9ee9e-default-rtdb.firebaseio.com",
  projectId: "gestor-financeiro-9ee9e",
  storageBucket: "gestor-financeiro-9ee9e.firebasestorage.app",
  messagingSenderId: "823405359954",
  appId: "1:823405359954:web:0ae778478207f9e8c0c08b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ─── CONSTANTS ────────────────────────────────────────────────────
const MONTHS     = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTH_KEYS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const CATEGORIES = [
  { id:'casa',        emoji:'🏠', label:'Casa',        color:'#0984e3' },
  { id:'saude',       emoji:'💊', label:'Saúde',       color:'#e17055' },
  { id:'necessidade', emoji:'🛒', label:'Necessidade', color:'#00b894' },
  { id:'bem-estar',   emoji:'✨', label:'Bem-estar',   color:'#a29bfe' },
  { id:'presente',    emoji:'🎁', label:'Presente',    color:'#fd79a8' },
  { id:'investimento',emoji:'📈', label:'Invest.',     color:'#00cec9' },
  { id:'igreja',      emoji:'⛪', label:'Igreja',      color:'#6c5ce7' },
  { id:'dividas',     emoji:'💳', label:'Dívidas',     color:'#d63031' },
  { id:'educacao',    emoji:'📚', label:'Educação',    color:'#fdcb6e' },
  { id:'diversao',    emoji:'🎉', label:'Diversão',    color:'#e84393' },
  { id:'cartao',      emoji:'💳', label:'Cartão',      color:'#6c5ce7' },
  { id:'outros',      emoji:'📦', label:'Outros',      color:'#b2bec3' },
];
function catById(id){ return CATEGORIES.find(c=>c.id===id)||CATEGORIES[CATEGORIES.length-1]; }

// ─── STATE ────────────────────────────────────────────────────────
const now = new Date();
let state = { user:'vitoria', year:now.getFullYear(), month:now.getMonth(), filterCat:'all' };
let monthData = null;
let activeRef = null;
let activeCallback = null;

function monthKey(){ return `${state.year}_${MONTH_KEYS[state.month]}`; }
function dbPath()  { return `financas/${monthKey()}`; }

const DEFAULT_MONTH = () => ({
  vitoria:{ salary20:0, salary05:0, extra:0, expenses:{} },
  geo:    { salary20:0, salary05:0, extra:0, expenses:{} }
});

// ─── FIREBASE REALTIME LISTENER ───────────────────────────────────
function attachListener(){
  // Desanexar listener anterior corretamente
  if(activeRef && activeCallback){
    activeRef.off('value', activeCallback);
  }
  activeRef = null;
  activeCallback = null;
  monthData = null;
  setSyncStatus('syncing');
  render(); // mostra loading enquanto aguarda Firebase

  activeRef = db.ref(dbPath());
  activeCallback = function(snap){
    monthData = snap.val() || DEFAULT_MONTH();
    ['vitoria','geo'].forEach(u=>{
      if(!monthData[u]) monthData[u] = DEFAULT_MONTH()[u];
      if(!monthData[u].expenses) monthData[u].expenses = {};
    });
    setSyncStatus('ok');
    render();
  };
  activeRef.on('value', activeCallback, function(err){
    console.error(err);
    setSyncStatus('error');
    showToast('⚠️ Erro de conexão com Firebase');
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────
function uid(){ return db.ref().push().key; }

// Lógica de datas dos pagamentos:
// Mês visualizado = mês de referência do salário
// Dia 20: adiantamento pago em 20 do mês ANTERIOR
// Dia 05: restante pago em 05 do próprio mês
function paymentDates(){
  const m = state.month; // 0-indexed
  const y = state.year;
  const prev  = m === 0 ? 11 : m - 1;
  const prevY = m === 0 ? y - 1 : y;
  return {
    label20: `Dia 20 de ${MONTHS[prev]}`,
    sub20:   'Adiantamento',
    label05: `Dia 05 de ${MONTHS[m]}`,
    sub05:   'Restante do salário',
  };
}

function setSyncStatus(s){
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-status-text');
  if(!dot) return;
  dot.className = 'sync-dot' + (s==='syncing'?' syncing':s==='error'?' error':'');
  text.textContent = s==='ok' ? '🟢 Tempo real' : s==='syncing' ? 'Sincronizando...' : '🔴 Sem conexão';
}

function fmt(v){
  return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function handleOverlayClick(e,id){
  if(e.target.id===id){
    if(confirm('Deseja fechar? As informações preenchidas serão perdidas.')){
      document.getElementById(id).classList.remove('open');
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────
function render(){
  document.getElementById('month-label').textContent = `${MONTHS[state.month]} ${state.year}`;
  document.querySelectorAll('.user-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.user-tab.${state.user}`).classList.add('active');

  if(!monthData){ document.getElementById('main-content').innerHTML=`<div class="loading-screen"><div class="spinner"></div><span>Carregando...</span></div>`; return; }

  const ud     = monthData[state.user];
  const allExp = Object.values(ud.expenses||{});
  const filtered = state.filterCat==='all' ? allExp : allExp.filter(e=>e.cat===state.filterCat);
  const exp20  = filtered.filter(e=>e.venc==='20');
  const exp05  = filtered.filter(e=>e.venc==='05');
  const total20= allExp.filter(e=>e.venc==='20').reduce((a,e)=>a+Number(e.value),0);
  const total05= allExp.filter(e=>e.venc==='05').reduce((a,e)=>a+Number(e.value),0);
  const income = Number(ud.salary20||0)+Number(ud.salary05||0)+Number(ud.extra||0);
  const spent  = total20+total05;
  const balance= income-spent;
  const pct    = income>0 ? Math.min(100,(spent/income)*100) : 0;

  const catTotals={};
  allExp.forEach(e=>{ catTotals[e.cat]=(catTotals[e.cat]||0)+Number(e.value); });
  const maxCat = Math.max(...Object.values(catTotals),1);

  let h='';

  // Salary cards
  h+=`<div class="salary-grid">
    <div class="salary-card" id="sc20" onclick="editSalaryCard('20')">
      <div class="slabel">💼 Salário Dia 20</div>
      <div class="sval">${fmt(ud.salary20)}</div><div class="sedit">Toque para editar</div>
      <input class="sinput" id="si20" type="number" value="${ud.salary20||0}" onblur="saveSalaryCard('20')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
    <div class="salary-card" id="sc05" onclick="editSalaryCard('05')">
      <div class="slabel">💼 Salário Dia 05</div>
      <div class="sval">${fmt(ud.salary05)}</div><div class="sedit">Toque para editar</div>
      <input class="sinput" id="si05" type="number" value="${ud.salary05||0}" onblur="saveSalaryCard('05')" onkeydown="if(event.key==='Enter')this.blur()">
    </div>
  </div>`;

  // Saldos por dia
  const pd = paymentDates();
  const bal20  = Number(ud.salary20||0) - total20;
  const bal05  = Number(ud.salary05||0) + Number(ud.extra||0) - total05;
  const bc=pct<80?'ok':pct<100?'warn':'over';

  // Card total do mês (full width)
  h+=`<div class="summary-grid">
    <div class="summary-card"><div class="label">Renda total</div><div class="value neutral">${fmt(income)}</div><div class="sub">Adiantamento + restante</div></div>
    <div class="summary-card"><div class="label">Total gasto</div><div class="value ${pct>=100?'negative':'neutral'}">${fmt(spent)}</div><div class="sub">${pct.toFixed(0)}% da renda</div></div>
    <div class="summary-card full">
      <div class="label">Saldo total do mês</div>
      <div class="value ${balance>=0?'positive':'negative'}">${balance>=0?'+':''}${fmt(balance)}</div>
      <div class="sub">${balance>=0?'🟢 Dentro do limite':'🔴 Acima da renda'}</div>
      <div class="bar-track" style="margin-top:10px"><div class="bar-fill ${bc}" style="width:${Math.min(pct,100)}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        <span style="font-size:11px;color:var(--text3)">Gastos</span>
        <span style="font-size:11px;color:var(--text3)">${pct.toFixed(0)}% da renda</span>
      </div>
    </div>
  </div>`;

  // Cards de saldo por dia
  h+=`<div class="saldo-grid">
    <div class="saldo-card dia20">
      <span class="sd-badge">Adiantamento</span>
      <div class="sd-date">📅 ${pd.label20}</div>
      <div class="sd-income">Recebido: ${fmt(ud.salary20)}</div>
      <div class="sd-spent">Gastos: ${fmt(total20)}</div>
      <div class="sd-balance ${bal20>=0?'pos':'neg'}">${bal20>=0?'+':''}${fmt(bal20)}</div>
      <div class="sd-sub">${bal20>=0?'Disponível neste dia':'Estourou neste dia'}</div>
    </div>
    <div class="saldo-card dia05">
      <span class="sd-badge">Restante</span>
      <div class="sd-date">📅 ${pd.label05}</div>
      <div class="sd-income">Recebido: ${fmt(Number(ud.salary05||0)+Number(ud.extra||0))}</div>
      <div class="sd-spent">Gastos: ${fmt(total05)}</div>
      <div class="sd-balance ${bal05>=0?'pos':'neg'}">${bal05>=0?'+':''}${fmt(bal05)}</div>
      <div class="sd-sub">${bal05>=0?'Disponível neste dia':'Estourou neste dia'}</div>
    </div>
  </div>`;

  // Category breakdown
  if(Object.keys(catTotals).length){
    h+=`<div class="section-header"><div class="section-title">📊 Por categoria</div></div><div class="cat-grid">`;
    CATEGORIES.forEach(cat=>{
      if(!catTotals[cat.id]) return;
      h+=`<div class="cat-card">
        <div class="cat-icon">${cat.emoji}</div>
        <div class="cat-name">${cat.label}</div>
        <div class="cat-amount">${fmt(catTotals[cat.id])}</div>
        <div class="cat-bar"><div class="cat-fill" style="width:${(catTotals[cat.id]/maxCat)*100}%;background:${cat.color}"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }

  // Filter chips
  h+=`<div class="section-header">
    <div class="section-title">📋 Lançamentos</div>
    <button class="btn-add" onclick="openAddModal()"><span style="font-size:20px;line-height:1">+</span> Novo</button>
  </div>
  <div class="filter-bar">
    <button class="chip ${state.filterCat==='all'?'active':''}" onclick="filterCat('all')">Todos (${allExp.length})</button>`;
  CATEGORIES.forEach(cat=>{
    const cnt=allExp.filter(e=>e.cat===cat.id).length;
    if(cnt>0) h+=`<button class="chip ${state.filterCat===cat.id?'active':''}" onclick="filterCat('${cat.id}')">${cat.emoji} ${cat.label} (${cnt})</button>`;
  });
  h+=`</div>`;

  // Expense list
  if(!filtered.length){
    h+=`<div class="empty-state"><div class="icon">📭</div><p>Sem lançamentos aqui.<br>Toque em <b>+</b> para adicionar.</p></div>`;
  } else {
    h+=`<div class="expense-list">`;
    [[exp20,'20'],[exp05,'05']].forEach(([list,day])=>{
      if(!list.length) return;
      const tot=list.reduce((a,e)=>a+Number(e.value),0);
      h+=`<div class="venc-separator"><div class="venc-line"></div><span class="venc-label">📅 Vencimento Dia ${day}</span><div class="venc-line"></div><span class="venc-total">${fmt(tot)}</span></div>`;
      list.forEach(e=>{ h+=renderExpense(e); });
    });
    h+=`</div>`;
  }

  document.getElementById('main-content').innerHTML=h;
}

function saveExpense(ev){
  ev.preventDefault();
  const btn=document.getElementById('btn-save-exp');
  btn.disabled=true; btn.textContent='⏳ Salvando...';
  const editId=document.getElementById('edit-id').value;
  const editMonthKey=document.getElementById('edit-month-key').value;
  const editParcelGroup=document.getElementById('edit-parcel-group').value;
  const isParcel=document.getElementById('f-is-parcel').checked;
  const baseDesc=document.getElementById('f-desc').value.trim();
  const baseValue=parseFloat(document.getElementById('f-value').value)||0;
  const payment=document.getElementById('f-payment').value.trim();
  const paid=document.getElementById('f-paid').checked;

  const updates={}; // Firebase multi-path update

  if(!isParcel){
    // ── Lançamento simples ──────────────────────────────────────────
    // Se editando parcelado → remove o registro antigo pelo mês correto
    if(editId && editMonthKey){
      ['vitoria','geo'].forEach(u=>{
        if((monthData[u]?.expenses||{})[editId])
          updates[`financas/${editMonthKey}/${u}/expenses/${editId}`]=null;
      });
    }
    const venc=document.getElementById('f-venc').value;
    const id=editId||uid();
    const expense={
      id, _owner:formUser, cat:selCat,
      desc:baseDesc, value:baseValue, venc, payment, paid,
      parcelGroup:null
    };
    updates[`financas/${monthKey()}/${formUser}/expenses/${id}`]=expense;

  } else if(editId && editParcelGroup){
    // ── Editar parcela individual já existente ──────────────────────
    // Atualiza APENAS este registro, no mês onde ele vive, preservando id e parcelGroup
    const venc=document.getElementById('f-parcel-venc').value;
    const cur=parseInt(document.getElementById('f-parcel-cur').value)||1;
    const total=parseInt(document.getElementById('f-parcel-total').value)||1;
    const startKey=document.getElementById('f-parcel-month').value;
    const expense={
      id:editId, _owner:formUser, cat:selCat,
      desc:baseDesc, value:baseValue,
      venc, payment, paid,
      parcelGroup:editParcelGroup,
      parcelCur:cur,
      parcelTotal:total,
      parcelStartKey:startKey,
    };
    updates[`financas/${editMonthKey}/${formUser}/expenses/${editId}`]=expense;

  } else {
    // ── Novo parcelado: criar uma entrada por mês ───────────────────
    const cur=parseInt(document.getElementById('f-parcel-cur').value)||1;
    const total=parseInt(document.getElementById('f-parcel-total').value)||1;
    const venc=document.getElementById('f-parcel-venc').value;
    const startKey=document.getElementById('f-parcel-month').value;
    const groupId=uid(); // novo groupId para o grupo

    const [sy,smk]=startKey.split('_');
    let startYear=parseInt(sy);
    let startMonth=MONTH_KEYS.indexOf(smk);

    const remaining=total-cur+1;
    for(let i=0;i<remaining;i++){
      const pNum=cur+i;
      const mIdx=(startMonth+i)%12;
      const mYear=startYear+Math.floor((startMonth+i)/12);
      const mk=`${mYear}_${MONTH_KEYS[mIdx]}`;
      const eid=uid();
      const expense={
        id:eid, _owner:formUser, cat:selCat,
        desc:baseDesc,
        value:baseValue,
        venc,
        payment,
        paid: i===0 ? paid : false,
        parcelGroup:groupId,
        parcelCur:pNum,
        parcelTotal:total,
        parcelStartKey:startKey,
      };
      updates[`financas/${mk}/${formUser}/expenses/${eid}`]=expense;
    }
  }

  db.ref().update(updates)
    .then(()=>{
      document.getElementById('modal-overlay').classList.remove('open');
      let msg;
      if(!isParcel){
        msg = editId ? '✅ Atualizado!' : '✅ Adicionado!';
      } else if(editId && editParcelGroup){
        msg = '✅ Parcela atualizada!';
      } else {
        const total=parseInt(document.getElementById('f-parcel-total').value);
        const cur=parseInt(document.getElementById('f-parcel-cur').value);
        msg = `✅ ${total-cur+1} parcelas lançadas!`;
      }
      showToast(msg);
    })
    .catch(err=>{ console.error(err); btn.disabled=false; btn.textContent='💾 Salvar'; showToast('⚠️ Erro ao salvar'); });
}

function deleteExpense(mode){
  const id          = document.getElementById('edit-id').value;
  const editMonthKey= document.getElementById('edit-month-key').value;
  const groupId     = document.getElementById('edit-parcel-group').value;

  if(mode==='group' && groupId){
    if(!confirm('Excluir TODAS as parcelas deste grupo?\nIsso removerá os lançamentos em todos os meses.')) return;

    // Busca todos os meses no Firebase que tenham entradas com este parcelGroup
    db.ref('financas').once('value').then(snap=>{
      const allData = snap.val()||{};
      const updates = {};
      Object.entries(allData).forEach(([mk, mData])=>{
        ['vitoria','geo'].forEach(u=>{
          const exps = mData?.[u]?.expenses||{};
          Object.entries(exps).forEach(([eid, exp])=>{
            if(exp && exp.parcelGroup === groupId){
              updates[`financas/${mk}/${u}/expenses/${eid}`] = null;
            }
          });
        });
      });
      return db.ref().update(updates);
    })
    .then(()=>{ document.getElementById('modal-overlay').classList.remove('open'); showToast('🗑 Todas as parcelas excluídas!'); })
    .catch(()=>showToast('⚠️ Erro ao excluir'));

  } else {
    if(!confirm('Excluir apenas este lançamento?')) return;
    const mk = editMonthKey || monthKey();
    const deletes = ['vitoria','geo']
      .filter(u=>(monthData[u]?.expenses||{})[id])
      .map(u=>db.ref(`financas/${mk}/${u}/expenses/${id}`).remove());
    Promise.all(deletes)
      .then(()=>{ document.getElementById('modal-overlay').classList.remove('open'); showToast('🗑 Excluído!'); })
      .catch(()=>showToast('⚠️ Erro ao excluir'));
  }
}

function toggleParcelFields(){
  const on=document.getElementById('f-is-parcel').checked;
  document.getElementById('parcel-fields').style.display=on?'block':'none';
  if(on) updateParcelPreview();
}

function populateMonthSelect(year, month){
  const sel=document.getElementById('f-parcel-month');
  if(!sel) return;
  sel.innerHTML='';
  // Mostrar 24 meses: 12 passados + 12 futuros
  for(let i=-12;i<=24;i++){
    let m=(month+i)%12; if(m<0) m+=12;
    const y=year+Math.floor((month+i)/12);
    const key=`${y}_${MONTH_KEYS[m]}`;
    const opt=document.createElement('option');
    opt.value=key;
    opt.textContent=`${MONTHS[m]} ${y}`;
    if(i===0) opt.selected=true;
    sel.appendChild(opt);
  }
}

function updateParcelPreview(){
  const cur=parseInt(document.getElementById('f-parcel-cur').value)||1;
  const total=parseInt(document.getElementById('f-parcel-total').value)||1;
  const remaining=total-cur+1;
  const el=document.getElementById('parcel-preview');
  if(!el) return;
  if(remaining<=0){ el.textContent='⚠️ Parcela atual maior que o total'; return; }
  el.textContent=`✔ ${remaining} parcelas serão lançadas (${cur}/${total} até ${total}/${total})`;
}

let currentScreen = 'home'; // 'home' | 'cards'
let cartoesData = {};
let cartoesRef = null;
let cartoesCallback = null;
let selectedCartaoEmoji = '💜';
let cdUser = 'nenhum';

function switchScreen(screen) {
  currentScreen = screen;

    monthNavRow.style.display = 'none';

function attachCartoesListener() {
  if (cartoesRef && cartoesCallback) {
    cartoesRef.off('value', cartoesCallback);
  }
  cartoesRef = db.ref('cartoes');
  cartoesCallback = function(snap) {
    cartoesData = snap.val() || {};
    if (currentScreen === 'cards') renderCartoes();
    // Also re-render home if open to reflect card totals
    if (currentScreen === 'home' && monthData) render();
  };
  cartoesRef.on('value', cartoesCallback);
}

function renderCartoes() {
  const main = document.getElementById('main-content');
  const cartaoList = Object.entries(cartoesData);

  // Totais gerais
  let totalGeral = 0;
  let totalVitoria = 0;
  let totalGeo = 0;
  cartaoList.forEach(([cid, c]) => {
    Object.values(c.despesas || {}).forEach(d => {
      const v = Number(d.value || 0);
      totalGeral += v;
      if (d.responsavel === 'vitoria') totalVitoria += v;
      else if (d.responsavel === 'geo') totalGeo += v;
      else if (d.responsavel === 'outros') { /* Outros: não entra na conta de nenhum dos dois */ }
      else { totalVitoria += v / 2; totalGeo += v / 2; } // Casal: divide igualmente
    });
  });

  let h = `
  <div class="cartao-summary-bar">
    <div class="cartao-sum-card"><div class="cslabel">💳 Total em cartões</div><div class="csval">${fmt(totalGeral)}</div></div>
    <div class="cartao-sum-card"><div class="cslabel">👥 Dos usuários</div><div class="csval">${fmt(totalVitoria + totalGeo)}</div></div>
  </div>
  <div class="card-list-grid">`;

    h += `<div class="empty-state"><div class="icon">💳</div><p>Nenhum cartão cadastrado ainda.<br>Adicione seu primeiro cartão abaixo.</p></div>`;
  } else {
    cartaoList.forEach(([cid, c]) => {
      const despesas = Object.values(c.despesas || {}).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      <div class="cartao-block" id="cblock-${cid}">
        <div class="cartao-header" onclick="toggleCartaoBlock('${cid}')">

            <div class="cartao-meta">${despesas.length} despesa${despesas.length !== 1 ? 's' : ''}</div>
          </div>
          <div>
            <div class="cartao-total">${fmt(total)}</div>
            <div class="cartao-total-label">Total</div>
          </div>
        </div>
        <div class="cartao-actions">
          <button class="btn-cartao-action" onclick="openNewCartaoDespesa('${cid}')">+ Despesa</button>
          <button class="btn-cartao-action" onclick="openEditCartao('${cid}')">✏️ Editar</button>
          <button class="btn-cartao-action danger" onclick="confirmDeleteCartao('${cid}')">🗑 Excluir</button>
        </div>
        <div class="cartao-despesas" id="cdlist-${cid}">`;

      if (!despesas.length) {
        h += `<div class="empty-cartao">Nenhuma despesa ainda. Toque em "+ Despesa".</div>`;
      } else {
        despesas.forEach(d => {
          const userEmoji = d.responsavel === 'vitoria' ? '👩' : d.responsavel === 'geo' ? '👨' : d.responsavel === 'outros' ? '🙋' : '👥';
          const userLabel = d.responsavel === 'vitoria' ? 'Vitória' : d.responsavel === 'geo' ? 'Geovanne' : d.responsavel === 'outros' ? ('Outros' + (d.outrosNome ? ` (${escHtml(d.outrosNome)})` : '')) : 'Casal';
          const dateFormatted = d.date ? new Date(d.date + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
          h += `
          <div class="cartao-despesa-item" onclick="openEditCartaoDespesa('${cid}','${d.id}')">

        });

      h += `</div></div>`;
    });
  }

  h += `</div>
  <div class="new-cartao-btn" onclick="openNewCartao()" style="margin-top:16px">+ Adicionar novo cartão</div>`;

  main.innerHTML = h;
}

    ? `Excluir o cartão "${c.name}" e todas as suas ${Object.keys(c.despesas).length} despesas?`

// ─── CARD PARCEL HELPERS ──────────────────────────────────────────
function cdPopulateMonthSelect() {
  const now2 = new Date();
  const year = now2.getFullYear();
  const month = now2.getMonth();

  // Parcel start month selector
  const sel = document.getElementById('cd-parcel-month');
  if (sel) {
    sel.innerHTML = '';
    for (let i = -12; i <= 24; i++) {
      let m = (month + i) % 12; if (m < 0) m += 12;
      const y = year + Math.floor((month + i) / 12);
      const key = `${y}_${MONTH_KEYS[m]}`;
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = `${MONTHS[m]} ${y}`;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  // Vencimento month selector (default = next month, since purchase today goes to next bill)
  cdPopulateVencMonth();
}

function cdPopulateVencMonth(selectedKey) {
  const sel = document.getElementById('cd-venc-month');
  if (!sel) return;
  const now2 = new Date();
  const year = now2.getFullYear();
  const month = now2.getMonth();
  sel.innerHTML = '';
  for (let i = -3; i <= 18; i++) {
    let m = (month + i) % 12; if (m < 0) m += 12;
    const y = year + Math.floor((month + i) / 12);
    const key = `${y}_${MONTH_KEYS[m]}`;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${MONTHS[m]} ${y}`;
    // default: next month (i === 1), or match selectedKey
    if (selectedKey ? key === selectedKey : i === 1) opt.selected = true;
    sel.appendChild(opt);
  }
}

function toggleCdParcelFields() {
  const on = document.getElementById('cd-is-parcel').checked;
  document.getElementById('cd-parcel-fields').style.display = on ? 'block' : 'none';
  // When parceled, billing month is set per-parcel via cd-parcel-month; hide single venc-month
  document.getElementById('cd-venc-month-row').style.display = on ? 'none' : '';
  if (on) updateCdParcelPreview();
}

function updateCdParcelPreview() {
  const cur = parseInt(document.getElementById('cd-parcel-cur').value) || 1;
  const total = parseInt(document.getElementById('cd-parcel-total').value) || 1;
  const remaining = total - cur + 1;
  const el = document.getElementById('cd-parcel-preview');
  if (!el) return;
  if (remaining <= 0) { el.textContent = '⚠️ Parcela atual maior que o total'; return; }
  el.textContent = `✔ ${remaining} parcela${remaining !== 1 ? 's' : ''} serão lançadas (${cur}/${total} até ${total}/${total})`;
}

// Helper: given a despesa object from cartoes, build home expense mirroring it.
// `owner` is who this specific mirror belongs to ('vitoria' or 'geo').
// `value` allows overriding the value (used to split "Casal" expenses in half).
function buildHomeExpense(despesa, cid, cartaoName, owner, value) {
  // For the home screen, venc day is the bill day (05, 10, 20 etc.)
  // The record lives in the financas month key = despesa.vencMonth
  const isCasal = despesa.responsavel === 'nenhum';
  return {
    id: despesa.id,
    _owner: owner,
    cat: 'cartao',
    desc: `💳 ${cartaoName}: ${despesa.desc}${isCasal ? ' (metade - casal)' : ''}`,
    value: value !== undefined ? value : despesa.value,
    venc: despesa.venc,         // day (05, 10, 20...)
    vencMonth: despesa.vencMonth, // month key stored for reference
    payment: cartaoName,
    paid: false,
    parcelGroup: despesa.parcelGroup || null,
    parcelCur: despesa.parcelCur || null,
    parcelTotal: despesa.parcelTotal || null,
    parcelStartKey: despesa.parcelStartKey || null,
    fromCartao: cid,
    casalSplit: isCasal || null,
  };
}

// Adds the correct home-mirror update(s) for a despesa into `updates`.
// If responsavel is 'vitoria' or 'geo', mirrors the full value to that user.
// If responsavel is 'nenhum' (Casal), splits the value equally between both users.
function addHomeMirrorUpdates(updates, despesa, cid, cartaoName) {
  const mk = despesa.vencMonth;
  if (!mk) return;
  if (despesa.responsavel === 'outros') return; // Não reflete na tela inicial: não é gasto de nenhum dos dois
  if (despesa.responsavel === 'vitoria' || despesa.responsavel === 'geo') {
    updates[`financas/${mk}/${despesa.responsavel}/expenses/${despesa.id}`] =
      buildHomeExpense(despesa, cid, cartaoName, despesa.responsavel, despesa.value);
  } else {
    // Casal: divide o valor igualmente entre os dois usuários
    const half = Math.round((Number(despesa.value || 0) / 2) * 100) / 100;
    updates[`financas/${mk}/vitoria/expenses/${despesa.id}`] =
      buildHomeExpense(despesa, cid, cartaoName, 'vitoria', half);
    updates[`financas/${mk}/geo/expenses/${despesa.id}`] =
      buildHomeExpense(despesa, cid, cartaoName, 'geo', half);
  }
}

function saveCartaoDespesa() {
  const desc    = document.getElementById('cd-desc').value.trim();
  const value   = parseFloat(document.getElementById('cd-value').value) || 0;
  const date    = document.getElementById('cd-date').value;
  const venc    = document.getElementById('cd-venc').value;
  const vencMonth = document.getElementById('cd-venc-month').value; // ex: "2026_jul"
  const cid     = document.getElementById('cd-cartao-id').value;
  const editId  = document.getElementById('cd-edit-id').value;
  const editParcelGroup = document.getElementById('cd-parcel-group').value;
  const isParcel = document.getElementById('cd-is-parcel').checked;
  const outrosNome = document.getElementById('cd-outros-nome').value.trim();
  const cartaoName = cartoesData[cid]?.name || 'Cartão';

  if (!desc)     { showToast('⚠️ Preencha a descrição'); return; }
  if (!value)    { showToast('⚠️ Informe o valor'); return; }
  if (!cid)      { showToast('⚠️ Cartão inválido'); return; }
  if (!vencMonth){ showToast('⚠️ Selecione o mês da fatura'); return; }

  const updates = {};

  // ── Helper: remove old home mirror using stored vencMonth ─────────
  const removeOldMirror = (oldDespesa) => {
    if (!oldDespesa) return;
    // Use stored vencMonth if available, fallback to date-based for legacy entries
    const oldMk = oldDespesa.vencMonth ||
      (oldDespesa.date
        ? (() => { const d = new Date(oldDespesa.date + 'T12:00:00'); return `${d.getFullYear()}_${MONTH_KEYS[d.getMonth()]}`; })()
        : null);
    if (!oldMk) return;
    if (oldDespesa.responsavel === 'vitoria' || oldDespesa.responsavel === 'geo') {
      updates[`financas/${oldMk}/${oldDespesa.responsavel}/expenses/${oldDespesa.id}`] = null;
    } else {
      // Casal (ou legado 'nenhum'): remove de ambos, caso exista
      updates[`financas/${oldMk}/vitoria/expenses/${oldDespesa.id}`] = null;
      updates[`financas/${oldMk}/geo/expenses/${oldDespesa.id}`] = null;
    }
  };

  if (!isParcel) {
    // ── Lançamento simples ─────────────────────────────────────────
    if (editId && editParcelGroup) {
      Object.values(cartoesData[cid]?.despesas || {}).forEach(d => {
        if (d.parcelGroup === editParcelGroup) {
          updates[`cartoes/${cid}/despesas/${d.id}`] = null;
          removeOldMirror(d);
        }
      });
    } else if (editId) {
      const old = (cartoesData[cid]?.despesas || {})[editId];
      if (old) removeOldMirror(old);
    }

    const did = editId || db.ref().push().key;
    const despesa = { id: did, desc, value, date, venc, vencMonth, responsavel: cdUser, outrosNome: cdUser === 'outros' ? outrosNome : null, parcelGroup: null, reflectido: cdUser !== 'outros' };
    updates[`cartoes/${cid}/despesas/${did}`] = despesa;
    // Mirror goes into the bill month (vencMonth), not purchase month
    addHomeMirrorUpdates(updates, despesa, cid, cartaoName);

  } else if (editId && editParcelGroup) {
    // ── Editar parcela individual já existente ────────────────────
    const old = (cartoesData[cid]?.despesas || {})[editId];
    const cur     = parseInt(document.getElementById('cd-parcel-cur').value) || 1;
    const total   = parseInt(document.getElementById('cd-parcel-total').value) || 1;
    const startKey = document.getElementById('cd-parcel-month').value;

    if (old) removeOldMirror(old);

    const despesa = { id: editId, desc, value, date, venc, vencMonth, responsavel: cdUser, outrosNome: cdUser === 'outros' ? outrosNome : null, parcelGroup: editParcelGroup, parcelCur: cur, parcelTotal: total, parcelStartKey: startKey, reflectido: cdUser !== 'outros' };
    updates[`cartoes/${cid}/despesas/${editId}`] = despesa;
    addHomeMirrorUpdates(updates, despesa, cid, cartaoName);

  } else {
    // ── Novo parcelado: criar uma entrada por mês ─────────────────
    // For parcels the cd-parcel-month IS the first billing month
    const cur      = parseInt(document.getElementById('cd-parcel-cur').value) || 1;
    const total    = parseInt(document.getElementById('cd-parcel-total').value) || 1;
    const startKey = document.getElementById('cd-parcel-month').value; // first billing month
    const groupId  = db.ref().push().key;

    const [sy, smk] = startKey.split('_');
    let startYear  = parseInt(sy);
    let startMonth = MONTH_KEYS.indexOf(smk);
    const remaining = total - cur + 1;

    if (editId) {
      const old = (cartoesData[cid]?.despesas || {})[editId];
      if (old) { updates[`cartoes/${cid}/despesas/${editId}`] = null; removeOldMirror(old); }
    }

    for (let i = 0; i < remaining; i++) {
      const pNum = cur + i;
      const mIdx = (startMonth + i) % 12;
      const mYear = startYear + Math.floor((startMonth + i) / 12);
      const mk = `${mYear}_${MONTH_KEYS[mIdx]}`; // each parcel's billing month
      const eid = db.ref().push().key;
      const despesa = {
        id: eid,
        desc: `${desc} (${pNum}/${total})`,
        value, date,
        venc,
        vencMonth: mk, // each parcel has its own billing month
        responsavel: cdUser,
        outrosNome: cdUser === 'outros' ? outrosNome : null,
        parcelGroup: groupId, parcelCur: pNum, parcelTotal: total, parcelStartKey: startKey,
        reflectido: cdUser !== 'outros',
      };
      updates[`cartoes/${cid}/despesas/${eid}`] = despesa;
      addHomeMirrorUpdates(updates, despesa, cid, cartaoName);
    }
  }

  db.ref().update(updates)
    .then(() => {
      document.getElementById('cartao-despesa-modal').classList.remove('open');
      let msg;
      if (!isParcel) {
        msg = editId ? '✅ Despesa atualizada!' : '✅ Despesa adicionada!';
      } else if (editId && editParcelGroup) {
        msg = '✅ Parcela atualizada!';
      } else {
        const cur2  = parseInt(document.getElementById('cd-parcel-cur').value) || 1;
        const tot2  = parseInt(document.getElementById('cd-parcel-total').value) || 1;
        msg = `✅ ${tot2 - cur2 + 1} parcelas lançadas!`;
      }
      showToast(msg);
    })
    .catch(err => { console.error(err); showToast('⚠️ Erro ao salvar'); });
}

function deleteCartaoDespesaModal() {
  const did = document.getElementById('cd-edit-id').value;
  const cid = document.getElementById('cd-cartao-id').value;
  if (!did || !cid) return;
  if (!confirm('Excluir apenas esta parcela?')) return;
  const old = (cartoesData[cid]?.despesas || {})[did];
  const updates = {};
  updates[`cartoes/${cid}/despesas/${did}`] = null;
  if (old) {
    const oldMk = old.vencMonth ||
      (old.date ? (() => { const d = new Date(old.date + 'T12:00:00'); return `${d.getFullYear()}_${MONTH_KEYS[d.getMonth()]}`; })() : null);
    if (oldMk) {
      if (old.responsavel === 'vitoria' || old.responsavel === 'geo') {
        updates[`financas/${oldMk}/${old.responsavel}/expenses/${did}`] = null;
      } else {
        updates[`financas/${oldMk}/vitoria/expenses/${did}`] = null;
        updates[`financas/${oldMk}/geo/expenses/${did}`] = null;
      }
    }
  }
  db.ref().update(updates)
    .then(() => { document.getElementById('cartao-despesa-modal').classList.remove('open'); showToast('🗑 Parcela excluída!'); })
    .catch(() => showToast('⚠️ Erro ao excluir'));
}

function deleteCartaoDespesaGroup() {
  const did = document.getElementById('cd-edit-id').value;
  const cid = document.getElementById('cd-cartao-id').value;
  const groupId = document.getElementById('cd-parcel-group').value;
  if (!groupId || !cid) return;
  if (!confirm('Excluir TODAS as parcelas deste grupo?\nIsso removerá os lançamentos em todos os meses.')) return;

  const updates = {};
  // Remove from cartoes
  Object.values(cartoesData[cid]?.despesas || {}).forEach(d => {
    if (d.parcelGroup === groupId) {
      updates[`cartoes/${cid}/despesas/${d.id}`] = null;
      // Remove mirror from financas
      const dMk = d.vencMonth ||
        (d.date ? (() => { const dt = new Date(d.date + 'T12:00:00'); return `${dt.getFullYear()}_${MONTH_KEYS[dt.getMonth()]}`; })() : null);
      if (dMk) {
        if (d.responsavel === 'vitoria' || d.responsavel === 'geo') {
          updates[`financas/${dMk}/${d.responsavel}/expenses/${d.id}`] = null;
        } else {
          updates[`financas/${dMk}/vitoria/expenses/${d.id}`] = null;
          updates[`financas/${dMk}/geo/expenses/${d.id}`] = null;
        }
      }
    }
  });
  // Also search financas globally for any mirror with this parcelGroup (safety net)
  db.ref('financas').once('value').then(snap => {
    const allData = snap.val() || {};
    Object.entries(allData).forEach(([mk, mData]) => {
      ['vitoria', 'geo'].forEach(u => {
        const exps = mData?.[u]?.expenses || {};
        Object.entries(exps).forEach(([eid, exp]) => {
          if (exp && exp.parcelGroup === groupId) {
            updates[`financas/${mk}/${u}/expenses/${eid}`] = null;
          }
        });
      });
    });
    return db.ref().update(updates);
  })
  .then(() => { document.getElementById('cartao-despesa-modal').classList.remove('open'); showToast('🗑 Todas as parcelas excluídas!'); })
  .catch(() => showToast('⚠️ Erro ao excluir'));
}
